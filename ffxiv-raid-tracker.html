<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><!-- v2 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFXIV 副本开荒犯错记录表</title>
<style>
/* ============================================================
   CSS Variables — FFXIV Dark Theme
   ============================================================ */
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-card: #1f2b47;
  --bg-card-hover: #263355;
  --bg-input: #0f1629;
  --bg-expand: #182032;
  --bg-modal-overlay: rgba(0,0,0,0.75);
  --bg-toast: #1f2b47;

  --text-primary: #e8e6e3;
  --text-secondary: #b0b0c0;
  --text-muted: #7a7a90;

  --accent-gold: #c9a44b;
  --accent-gold-dim: #a07d30;
  --accent-blue: #4a9eff;
  --accent-green: #2ecc71;
  --accent-red: #e74c3c;
  --accent-orange: #e67e22;
  --accent-yellow: #f39c12;

  --role-tank: #4169e1;
  --role-healer: #2ecc71;
  --role-dps: #e74c3c;

  --severity-low: #2ecc71;
  --severity-medium: #f39c12;
  --severity-high: #e67e22;
  --severity-critical: #e74c3c;

  --border-color: #2a3050;
  --border-radius: 8px;
  --border-radius-sm: 5px;
  --shadow-card: 0 2px 10px rgba(0,0,0,0.35);
  --shadow-elevated: 0 6px 24px rgba(0,0,0,0.5);

  --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', 'SF Mono', monospace;

  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 20px;
  --space-xl: 28px;

  --transition-fast: 120ms ease;
  --transition-normal: 220ms ease;
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
::selection { background: var(--accent-gold); color: var(--bg-primary); }

/* ============================================================
   App Container
   ============================================================ */
#app {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--space-md) var(--space-md) 80px;
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}

/* ============================================================
   Header
   ============================================================ */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: var(--space-md);
  padding-bottom: var(--space-md);
  border-bottom: 2px solid var(--accent-gold);
}
.title {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent-gold);
  letter-spacing: 0.5px;
  text-shadow: 0 0 20px rgba(201,164,75,0.3);
}
.title-icon { margin-right: 6px; }
.header-actions { display: flex; gap: var(--space-sm); flex-wrap: wrap; align-items: center; }

/* Role Indicator */
#roleIndicator {
  font-size: 0.82rem; font-weight: 700; padding: 3px 12px;
  border-radius: 10px; white-space: nowrap;
}
#roleIndicator.captain { background: var(--accent-gold); color: var(--bg-primary); }
#roleIndicator.member { background: var(--accent-blue); color: #fff; }

/* Captain-only elements: hidden when member mode */
body.member-mode .captain-only { display: none !important; }

/* ============================================================
   Buttons
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px;
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-sm);
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
  user-select: none;
  font-family: inherit;
}
.btn:hover { background: var(--bg-card-hover); border-color: var(--accent-gold-dim); }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent-gold); color: var(--bg-primary); border-color: var(--accent-gold); font-weight: 600; }
.btn-primary:hover { background: var(--accent-gold-dim); }
.btn-danger { color: var(--accent-red); border-color: var(--accent-red); }
.btn-danger:hover { background: var(--accent-red); color: #fff; }
.btn-small { padding: 3px 10px; font-size: 0.78rem; }
.btn-large { padding: 10px 28px; font-size: 1rem; }
.btn-icon { padding: 6px 10px; font-size: 0.9rem; }
.btn-active { background: var(--accent-gold); color: var(--bg-primary); border-color: var(--accent-gold); }

/* ============================================================
   Connection Bar
   ============================================================ */
#connectionBar {
  display: flex; align-items: center; flex-wrap: wrap; gap: var(--space-sm);
  padding: 8px 12px;
  background: var(--bg-secondary);
  border-radius: var(--border-radius);
  font-size: 0.85rem;
}
#connectionBar .conn-status { display: flex; align-items: center; gap: 4px; }
#connectionBar .conn-dot { width: 9px; height: 9px; border-radius: 50%; }
.conn-dot.online { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
.conn-dot.saving { background: var(--accent-yellow); animation: pulse 0.6s ease infinite; }
.conn-dot.saved { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
.conn-dot.syncing { background: var(--accent-yellow); animation: pulse 0.8s ease infinite; }
.conn-dot.offline { background: var(--accent-red); }
.conn-dot.local { background: var(--text-muted); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#blobIdDisplay {
  font-family: var(--font-mono); font-weight: 600; color: var(--accent-blue);
  background: var(--bg-input); padding: 2px 8px; border-radius: 4px;
  font-size: 0.8rem;
}
#connActions { display: flex; gap: var(--space-sm); margin-left: auto; }

/* ============================================================
   Quick Record Bar — Sticky
   ============================================================ */
#quickBar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(22,33,62,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  padding: var(--space-sm) var(--space-md);
  display: flex; flex-direction: column; gap: 6px;
}
#quickBar .member-selector {
  display: flex; gap: 4px; flex-wrap: wrap;
}
#quickBar .qb-member {
  padding: 4px 10px; border-radius: var(--border-radius-sm);
  border: 1px solid var(--border-color);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer; font-size: 0.78rem; font-weight: 600;
  transition: all var(--transition-fast);
  user-select: none;
  font-family: inherit;
}
#quickBar .qb-member:hover { background: var(--bg-card-hover); color: var(--text-primary); }
#quickBar .qb-member.selected { border-color: var(--accent-gold); background: var(--accent-gold); color: var(--bg-primary); }
#quickBar .qb-member.role-tank { border-left: 3px solid var(--role-tank); }
#quickBar .qb-member.role-healer { border-left: 3px solid var(--role-healer); }
#quickBar .qb-member.role-dps { border-left: 3px solid var(--role-dps); }
#quickBar .qb-member.role-team { border-left: 3px solid var(--accent-orange); }
#quickBar .qb-member .job-icon {
  width: 22px; height: 22px; vertical-align: middle;
  border-radius: 3px; object-fit: contain; margin-right: 2px;
  filter: brightness(0.9);
  transition: filter var(--transition-fast);
}
#quickBar .qb-member:hover .job-icon,
#quickBar .qb-member.selected .job-icon { filter: brightness(1.1); }
#quickBar .qb-input-row { display: flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap; }
#quickBar .qb-desc {
  flex: 1; min-width: 150px;
  padding: 6px 10px; border-radius: var(--border-radius-sm);
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color);
  font-size: 0.85rem; font-family: inherit;
  transition: border-color var(--transition-fast);
}
#quickBar .qb-desc:focus { outline: none; border-color: var(--accent-gold); }
#quickBar .qb-count {
  width: 56px; padding: 6px 4px; text-align: center;
  border-radius: var(--border-radius-sm);
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color);
  font-size: 0.85rem; font-family: inherit;
}
#quickBar .qb-count:focus { outline: none; border-color: var(--accent-gold); }
#quickBar .qb-presets { display: flex; gap: 4px; flex-wrap: wrap; }
#quickBar .qb-preset {
  padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;
  background: var(--bg-card); color: var(--text-secondary);
  border: 1px solid var(--border-color); cursor: pointer;
  transition: all var(--transition-fast); user-select: none; font-family: inherit;
}
#quickBar .qb-preset:hover { background: var(--bg-card-hover); color: var(--accent-gold); border-color: var(--accent-gold-dim); }
#quickBar .qb-hint { font-size: 0.7rem; color: var(--text-muted); }
#quickBar .qb-hint kbd {
  background: var(--bg-input); padding: 1px 5px; border-radius: 3px;
  border: 1px solid var(--border-color); font-family: var(--font-mono); font-size: 0.7rem;
}

/* ============================================================
   Day Navigation
   ============================================================ */
#dayNav {
  display: flex; align-items: center; gap: var(--space-sm); flex-wrap: wrap;
}
#dayNav .date-input {
  padding: 6px 10px; border-radius: var(--border-radius-sm);
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color);
  font-size: 0.9rem; font-family: inherit; cursor: pointer;
}
#dayNav .date-input:focus { outline: none; border-color: var(--accent-gold); }
#dayNav .day-label { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); min-width: 100px; text-align: center; }

/* ============================================================
   Day Summary Card
   ============================================================ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  padding: var(--space-lg);
}
.card h2 {
  font-size: 1rem; font-weight: 600; color: var(--accent-gold);
  margin-bottom: var(--space-md);
  letter-spacing: 0.5px;
}
.form-group { margin-bottom: var(--space-md); }
.form-group:last-child { margin-bottom: 0; }
.form-group label {
  display: block; font-size: 0.82rem; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 4px;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 8px 12px; border-radius: var(--border-radius-sm);
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color);
  font-size: 0.9rem; font-family: inherit;
  transition: border-color var(--transition-fast);
  resize: vertical;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none; border-color: var(--accent-gold);
}

/* ============================================================
   Member Cards Grid
   ============================================================ */
.role-section { margin-bottom: var(--space-lg); }
.role-section:last-child { margin-bottom: 0; }
.role-heading {
  font-size: 0.9rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: var(--space-md);
  padding-left: var(--space-md); border-left: 3px solid var(--accent-gold);
}
.role-heading.tank { color: var(--role-tank); border-left-color: var(--role-tank); }
.role-heading.healer { color: var(--role-healer); border-left-color: var(--role-healer); }
.role-heading.dps { color: var(--role-dps); border-left-color: var(--role-dps); }
.role-heading.team { color: var(--accent-orange); border-left-color: var(--accent-orange); }

.member-cards {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: var(--space-md);
}

.member-card {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: var(--border-radius); overflow: hidden;
  transition: all var(--transition-normal);
}
.member-card:hover { border-color: var(--accent-gold-dim); box-shadow: var(--shadow-elevated); }
.member-card .card-header {
  padding: var(--space-md); display: flex; align-items: center;
  justify-content: space-between; gap: var(--space-sm);
  border-bottom: 1px solid var(--border-color);
  cursor: default;
}
.member-card .card-header.role-tank { border-left: 4px solid var(--role-tank); }
.member-card .card-header.role-healer { border-left: 4px solid var(--role-healer); }
.member-card .card-header.role-dps { border-left: 4px solid var(--role-dps); }
.member-card .member-icon { font-size: 1.3rem; }
.member-card .job-icon {
  width: 38px; height: 38px; object-fit: contain;
  border-radius: 5px; flex-shrink: 0;
  filter: drop-shadow(0 0 4px rgba(201,164,75,0.25));
  transition: filter var(--transition-fast);
}
.member-card:hover .job-icon { filter: drop-shadow(0 0 8px rgba(201,164,75,0.5)); }
.member-card .member-info { flex: 1; min-width: 0; }
.member-card .member-role { font-weight: 700; font-size: 0.85rem; color: var(--text-secondary); }
.member-card .member-name-input {
  background: transparent; border: 1px solid transparent; color: var(--text-primary);
  font-size: 0.95rem; font-weight: 600; padding: 2px 4px; border-radius: 3px;
  font-family: inherit; max-width: 120px; cursor: pointer;
  transition: all var(--transition-fast);
}
.member-card .member-name-input:hover { border-color: var(--border-color); }
.member-card .member-name-input:focus { border-color: var(--accent-gold); outline: none; cursor: text; background: var(--bg-input); }
.member-card .member-name-input.member-readonly { border: none; cursor: default; pointer-events: none; opacity: 0.9; }
.member-card .badge {
  font-size: 0.75rem; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; background: var(--bg-input);
}
.member-card .badge.has-mistakes { background: var(--accent-red); color: #fff; }
.member-card .badge.clean { background: var(--accent-green); color: #fff; }

.member-card .mistake-list {
  padding: var(--space-sm) var(--space-md); list-style: none;
  display: flex; flex-direction: column; gap: 2px;
}
.member-card .mistake-list:empty::after {
  content: '暂无记录'; display: block; text-align: center;
  color: var(--text-muted); font-size: 0.8rem; padding: var(--space-sm) 0;
}

/* Mistake Entry */
.mistake-entry { border-radius: var(--border-radius-sm); overflow: hidden; }
.mistake-entry .mistake-summary {
  display: flex; align-items: center; gap: var(--space-sm);
  padding: 6px 8px; border-radius: var(--border-radius-sm);
  cursor: pointer; transition: background var(--transition-fast);
  font-size: 0.83rem;
}
.mistake-entry .mistake-summary:hover { background: var(--bg-card-hover); }
.mistake-entry .mistake-desc { flex: 1; min-width: 0; word-break: break-word; }
.mistake-entry .mistake-count { font-weight: 700; color: var(--accent-gold); white-space: nowrap; }
.mistake-entry .expand-icon {
  font-size: 0.6rem; color: var(--text-muted); transition: transform var(--transition-fast);
  flex-shrink: 0;
}
.mistake-entry.expanded .expand-icon { transform: rotate(90deg); }
.mistake-entry .has-tips-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent-blue);
  flex-shrink: 0;
}

.mistake-entry .mistake-detail {
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s ease, padding 0.35s ease;
  padding: 0 12px;
}
.mistake-entry.expanded .mistake-detail {
  max-height: 300px;
}
.mistake-entry .mistake-detail-inner {
  padding: var(--space-sm) 0;
  display: flex; flex-direction: column; gap: var(--space-sm);
}
.mistake-entry .tips-textarea {
  width: 100%; min-height: 60px; padding: 8px 10px;
  border-radius: var(--border-radius-sm); font-size: 0.8rem;
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color);
  font-family: inherit; resize: vertical;
  transition: border-color var(--transition-fast);
}
.mistake-entry .tips-textarea:focus { outline: none; border-color: var(--accent-gold); }
.mistake-entry .tips-meta {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.72rem; color: var(--text-muted); flex-wrap: wrap; gap: var(--space-sm);
}
.mistake-entry .tips-by { font-style: italic; }

/* Add mistake inline form */
.add-mistake-form {
  padding: 8px 12px; display: flex; flex-direction: column; gap: 6px;
}
.add-mistake-form input, .add-mistake-form textarea {
  padding: 6px 10px; border-radius: var(--border-radius-sm);
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color); font-size: 0.82rem; font-family: inherit;
}
.add-mistake-form input:focus, .add-mistake-form textarea:focus { outline: none; border-color: var(--accent-gold); }
.add-mistake-form .add-row { display: flex; gap: var(--space-sm); align-items: center; }
.add-mistake-form .add-count { width: 52px; }

/* ============================================================
   Team Issues
   ============================================================ */
#teamIssues .issue-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: var(--space-md); }
#teamIssues .issue-list:empty::after {
  content: '暂无团队问题'; display: block; text-align: center;
  color: var(--text-muted); font-size: 0.82rem; padding: var(--space-sm) 0;
}
.issue-entry {
  display: flex; align-items: center; gap: var(--space-sm);
  padding: 6px 10px; background: var(--bg-input); border-radius: var(--border-radius-sm);
  font-size: 0.85rem;
}
.issue-entry .issue-sev { font-weight: 700; font-size: 0.75rem; white-space: nowrap; }
.issue-entry .issue-desc { flex: 1; min-width: 0; word-break: break-word; }
.sev-low { color: var(--severity-low); }
.sev-medium { color: var(--severity-medium); }
.sev-high { color: var(--severity-high); }
.sev-critical { color: var(--severity-critical); }

.add-issue-form {
  display: flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap;
}
.add-issue-form input { flex:1; min-width:150px; }
.add-issue-form select { width: 100px; }

/* ============================================================
   Bottom Actions
   ============================================================ */
#bottomActions {
  display: flex; gap: var(--space-sm); flex-wrap: wrap; justify-content: center;
}

/* ============================================================
   Modal
   ============================================================ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg-modal-overlay);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  padding: var(--space-lg);
}
.modal-overlay:not([hidden]) {
  display: flex;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-content {
  background: var(--bg-secondary); border: 1px solid var(--accent-gold);
  border-radius: var(--border-radius); padding: var(--space-xl);
  max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto;
  animation: modalIn 0.25s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-content h2 { color: var(--accent-gold); margin-bottom: var(--space-lg); font-size: 1.1rem; }
.modal-content pre {
  background: var(--bg-input); padding: var(--space-lg); border-radius: var(--border-radius-sm);
  font-family: var(--font-mono); font-size: 0.82rem; line-height: 1.7;
  color: var(--text-primary); white-space: pre-wrap; word-break: break-word;
  max-height: 50vh; overflow-y: auto; border: 1px solid var(--border-color);
}
.modal-actions {
  display: flex; gap: var(--space-sm); justify-content: flex-end; margin-top: var(--space-lg);
}

/* ============================================================
   Toast
   ============================================================ */
.toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 300;
  display: flex; flex-direction: column-reverse; gap: var(--space-sm);
}
.toast {
  padding: 10px 18px; border-radius: var(--border-radius-sm);
  background: var(--bg-toast); color: var(--text-primary);
  border: 1px solid var(--border-color); font-size: 0.85rem;
  box-shadow: var(--shadow-elevated);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
  max-width: 340px;
}
@keyframes toastIn { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
@keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(60px); } }
.toast.success { border-left: 3px solid var(--accent-green); }
.toast.error { border-left: 3px solid var(--accent-red); }
.toast.info { border-left: 3px solid var(--accent-blue); }

/* ============================================================
   Preset Editor
   ============================================================ */
#presetEditor { margin-top: var(--space-sm); display: none; flex-wrap: wrap; gap: var(--space-sm); align-items: center; }
#presetEditor.open { display: flex; }
#presetEditor input { flex: 1; min-width: 120px; }
#presetEditor .preset-tags { display: flex; gap:4px; flex-wrap:wrap; }
#presetEditor .preset-tag {
  display: inline-flex; align-items: center; gap:2px;
  padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;
  background: var(--bg-input); color: var(--text-secondary);
  border: 1px solid var(--border-color);
}
#presetEditor .preset-tag .preset-remove { cursor: pointer; color: var(--accent-red); font-weight: 700; margin-left: 2px; }

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 900px) {
  .member-cards { grid-template-columns: repeat(2, 1fr); }
  #header { flex-direction: column; align-items: flex-start; }
  #quickBar .qb-input-row { flex-direction: column; align-items: stretch; }
  #quickBar .qb-count { width: 100%; }
}
@media (max-width: 560px) {
  html { font-size: 14px; }
  .member-cards { grid-template-columns: 1fr; }
  #app { padding: var(--space-sm); gap: var(--space-md); }
  #dayNav { justify-content: center; }
  #connectionBar { flex-direction: column; align-items: stretch; }
  #connActions { margin-left: 0; justify-content: flex-end; }
  .modal-content { padding: var(--space-md); }
}

/* ============================================================
   Mini Calendar
   ============================================================ */
#miniCalendar { padding: var(--space-md); max-width: 400px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-sm); }
.cal-title { font-weight: 700; font-size: 0.95rem; color: var(--accent-gold); }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day {
  position: relative; text-align: center; padding: 6px 2px; border-radius: var(--border-radius-sm);
  font-size: 0.82rem; cursor: pointer; transition: all var(--transition-fast);
  color: var(--text-secondary); user-select: none;
}
.cal-day:hover { background: var(--bg-card-hover); }
.cal-day.today { color: var(--accent-gold); font-weight: 700; }
.cal-day.active { background: var(--accent-gold); color: var(--bg-primary); font-weight: 700; border-radius: var(--border-radius-sm); }
.cal-day.other-month { color: var(--text-muted); opacity: 0.4; }
.cal-day.has-record::after {
  content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
  width: 5px; height: 5px; border-radius: 50%; background: var(--accent-green);
}
.cal-day.active.has-record::after { background: var(--bg-primary); }
.cal-day.has-record { color: var(--text-primary); font-weight: 600; }
.cal-note { font-size: 0.7rem; color: var(--text-muted); margin-top: var(--space-sm); text-align: center; }
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header id="header">
    <h1 class="title"><span class="title-icon">⚔️</span>FFXIV 副本开荒犯错记录表</h1>
    <div class="header-actions">
      <span id="roleIndicator"></span>
      <button id="exportBtn" class="btn captain-only">💾 导出备份</button>
      <button id="importBtn" class="btn captain-only">📥 导入数据</button>
    </div>
  </header>

  <!-- Connection Bar -->
  <div id="connectionBar">
    <span class="conn-status"><span id="connDot" class="conn-dot local"></span><span id="connLabel">本地模式</span></span>
    <span id="blobIdDisplay"></span>
    <span id="connActions">
      <button id="manualSyncBtn" class="btn btn-small btn-primary captain-only" style="display:none;">☁️ 保存到云端</button>
      <button id="copyBlobIdBtn" class="btn btn-small captain-only" style="display:none;">📋 复制分享链接</button>
      <button id="disconnectBtn" class="btn btn-small btn-danger captain-only" style="display:none;">断开</button>
    </span>
  </div>


  <!-- Quick Record Bar -->
  <div id="quickBar" class="captain-only">
    <div class="member-selector" id="qbMemberSelector">
      <button class="qb-member role-tank" data-member="MT" id="qbMT"></button>
      <button class="qb-member role-tank" data-member="ST" id="qbST"></button>
      <button class="qb-member role-healer" data-member="H1" id="qbH1"></button>
      <button class="qb-member role-healer" data-member="H2" id="qbH2"></button>
      <button class="qb-member role-dps" data-member="D1" id="qbD1"></button>
      <button class="qb-member role-dps" data-member="D2" id="qbD2"></button>
      <button class="qb-member role-dps" data-member="D3" id="qbD3"></button>
      <button class="qb-member role-dps" data-member="D4" id="qbD4"></button>
      <button class="qb-member role-team" data-member="__team__">⚠️ 团队</button>
    </div>
    <div class="qb-input-row">
      <input type="text" class="qb-desc" id="qbDesc" placeholder="犯错描述... (Enter 提交)" maxlength="200">
      <input type="number" class="qb-count" id="qbCount" value="1" min="1" max="99">
      <button class="btn btn-primary btn-small" id="qbSubmit">✓ 添加</button>
      <span class="qb-hint">快捷键: <kbd>1</kbd>-<kbd>8</kbd> 选队员, <kbd>T</kbd> 团队, <kbd>Enter</kbd> 提交</span>
    </div>
    <div class="qb-presets" id="qbPresets"></div>
    <button class="btn btn-small" id="togglePresetEditor" style="display:none;">⚙ 编辑预设</button>
    <div id="presetEditor">
      <input type="text" id="newPresetInput" placeholder="新预设名称" maxlength="20">
      <button class="btn btn-small" id="addPresetBtn">+ 添加</button>
      <div class="preset-tags" id="presetTags"></div>
      <button class="btn btn-small" id="closePresetEditor">完成</button>
    </div>
  </div>

  <!-- Day Navigation -->
  <nav id="dayNav">
    <button id="prevDay" class="btn btn-icon">◀</button>
    <input type="date" id="datePicker" class="date-input">
    <span class="day-label" id="dayLabel"></span>
    <button id="nextDay" class="btn btn-icon">▶</button>
    <button id="todayBtn" class="btn">📅 今天</button>
    <button id="toggleCalendarBtn" class="btn">🗓 日历</button>
  </nav>

  <!-- Mini Calendar -->
  <div id="miniCalendar" class="card" hidden>
    <div class="cal-header">
      <button id="calPrev" class="btn btn-icon btn-small">◀</button>
      <span id="calTitle" class="cal-title"></span>
      <button id="calNext" class="btn btn-icon btn-small">▶</button>
    </div>
    <div class="cal-weekdays">
      <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    <div class="cal-days" id="calDays"></div>
    <div class="cal-note">💡 凌晨4:00前仍记为前一天</div>
  </div>

  <!-- Day Summary -->
  <section id="daySummary" class="card">
    <div class="form-group">
      <label for="furthestPhase">📊 最远进度</label>
      <input type="text" id="furthestPhase" placeholder="例如: P2 - Limit Cut / 狂暴 1%">
    </div>
    <div class="form-group">
      <label for="generalNotes">📝 当日备注</label>
      <textarea id="generalNotes" rows="2" placeholder="关于本次开荒的整体备注..."></textarea>
    </div>
  </section>

  <!-- Member Grid -->
  <section id="membersGrid"></section>

  <!-- Team Issues -->
  <section id="teamIssues" class="card">
    <h2>⚠️ 团队问题</h2>
    <ul class="issue-list" id="issueList"></ul>
    <div class="add-issue-form captain-only" id="addIssueForm">
      <input type="text" id="newIssueDesc" placeholder="团队问题描述..." maxlength="200">
      <select id="newIssueSev">
        <option value="low">🟢 低</option>
        <option value="medium" selected>🟡 中</option>
        <option value="high">🟠 高</option>
        <option value="critical">🔴 严重</option>
      </select>
      <button class="btn btn-small" id="addIssueBtn">+ 添加</button>
    </div>
  </section>

  <!-- Bottom Actions -->
  <div id="bottomActions">
    <button id="generateSummaryBtn" class="btn btn-primary btn-large captain-only">📋 生成当日总结</button>
  </div>
</div>

<!-- Summary Modal -->
<div id="summaryModal" class="modal-overlay" hidden>
  <div class="modal-content">
    <h2>📋 当日犯错总结</h2>
    <pre id="summaryText"></pre>
    <div class="modal-actions">
      <button id="copySummaryBtn" class="btn btn-primary">📋 复制到剪贴板</button>
      <button id="closeModalBtn" class="btn">关闭</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Hidden file input -->
<input type="file" id="importFileInput" accept=".json" hidden>

function generateId() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) {
    return crypto.randomUUID();
  }
  return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
}

function escapeHtml(str) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
  return String(str).replace(/[&<>"']/g, c => map[c]);
}

function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}

function formatDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  const weekdays = ['日','一','二','三','四','五','六'];
  const w = new Date(iso + 'T00:00:00').getDay();
  return `${y}年${parseInt(m)}月${parseInt(d)}日 周${weekdays[w]}`;
}

function todayISO() {
  // FFXIV raid day: before 4:00 AM still counts as previous day
  const d = new Date();
  if (d.getHours() < 4) {
    d.setDate(d.getDate() - 1);
  }
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function isoAddDays(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function createEmptyState() {
  return {
    version: CURRENT_VERSION,
    teamId: '',
    teamName: '',
    memberNames: { MT:'', ST:'', H1:'', H2:'', D1:'', D2:'', D3:'', D4:'' },
    mistakePresets: [...DEFAULT_PRESETS],
    days: {},
  };
}

function createEmptyDay() {
  const members = {};
  for (const key of Object.keys(ROLES)) {
    members[key] = { mistakes: [] };
  }
  return {
    furthestPhase: '',
    generalNotes: '',
    members,
    teamIssues: [],
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.version >= 1 && parsed.days && parsed.memberNames) {
        state = parsed;
        console.log('[loadState] 从 localStorage 加载，lastModified:', new Date(state.lastModified || 0).toLocaleString(), '天数:', Object.keys(state.days).length);
        // migration for new fields
        if (!state.mistakePresets) state.mistakePresets = [...DEFAULT_PRESETS];
        if (!state.teamId) state.teamId = '';
        if (!state.teamName) state.teamName = '';
        // migrate old blobId to teamId if needed
        if (!state.teamId && state.blobId) {
          state.teamId = state.blobId;
          delete state.blobId;
        }
        // 迁移旧版 state.token：直接删除（现在用内置 token）
        if (state.token) {
          delete state.token;
        }
        for (const day of Object.values(state.days)) {
          for (const key of Object.keys(ROLES)) {
            if (!day.members[key]) day.members[key] = { mistakes: [] };
            if (!day.members[key].mistakes) day.members[key].mistakes = [];
          }
          if (!day.teamIssues) day.teamIssues = [];
        }
        return;
      }
    }
  } catch (e) { /* corrupted, reset */ }
  state = createEmptyState();
  saveLocal();
}

function saveLocal() {
  try {
    state.lastModified = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    showToast('⚠️ 本地存储已满，请导出数据备份', 'error');
  }
}

function getDay(date) {
  if (!state.days[date]) {
    state.days[date] = createEmptyDay();
    saveLocal();
  }
  return state.days[date];
}

function getActiveDay() {
  return getDay(activeDate);
}

function saveState() {
  saveLocal();
  // 不再自动同步云端，队长需手动点击「☁️ 保存到云端」按钮
}

// ============================================================
// SECTION 4: CLOUD SYNC (GitHub Contents API)
// ============================================================
// Data stored as data/{teamId}.json in the repo
// GitHub API 云存储：内置 PAT token，用户零配置

let githubToken = BUILTIN_TOKEN;
let cloudFileSha = ''; // SHA of current file on GitHub, needed for updates

debouncedSaveToCloud = debounce(syncToCloud, 1500);

function getTeamDataPath() {
  return `data/${state.teamId || 'default'}.json`;
}

function githubApiUrl() {
  return `${GITHUB_API}/repos/${GITHUB_REPO}/contents/${getTeamDataPath()}`;
}

function githubHeaders(forWrite) {
  const h = {
    'Accept': 'application/vnd.github.v3+json',
    'Authorization': `token ${githubToken}`
  };
  if (forWrite) {
    h['Content-Type'] = 'application/json';
  }
  return h;
}

async function syncToCloud() {
  if (!state.teamId) return;
  try {
    // GET the file's SHA via API (with token to avoid rate limit)
    if (!cloudFileSha) {
      try {
        const getResp = await fetch(githubApiUrl(), { headers: githubHeaders(true) });
        if (getResp.ok) {
          const getData = await getResp.json();
          cloudFileSha = getData.sha;
        }
        // 404 is fine — file doesn't exist yet
      } catch (_) {}
    }

    // 上传前更新时间戳，确保云端数据比本地旧时不被覆盖
    state.lastModified = Date.now();
    saveLocal();
    console.log('[syncToCloud] 上传数据，lastModified:', new Date(state.lastModified).toLocaleString(), '天数:', Object.keys(state.days).length);

    // base64 编码（与下载解码完全对称：encodeURIComponent → escape → btoa）
    const base64 = btoa(unescape(encodeURIComponent(JSON.stringify(state))));

    const body = {
      message: `update ${getTeamDataPath()}`,
      content: base64,
    };
    if (cloudFileSha) body.sha = cloudFileSha;

    const resp = await fetch(githubApiUrl(), {
      method: 'PUT',
      headers: githubHeaders(true),
      body: JSON.stringify(body),
    });
    if (resp.ok) {
      const data = await resp.json();
      cloudFileSha = data.content.sha;
      lastCloudFetch = JSON.stringify(state);
      lastWriteTime = Date.now(); // 记录写入时间，防止轮询覆盖
      cloudConnected = true;
      // 刷新 jsDelivr CDN 缓存，确保队员读取到最新数据
      purgeJsDelivrCache();
      // 显示"已同步"状态，3 秒后恢复
      showSavedStatus();
    } else {
      const err = await resp.json().catch(() => ({}));
      console.error('syncToCloud error:', resp.status, err);
      cloudConnected = false;
      setConnStatus('offline');
      renderConnectionBar();
      showToast('❌ 同步失败: ' + (err.message || resp.status), 'error');
    }
  } catch (e) {
    console.error('syncToCloud exception:', e);
    cloudConnected = false;
    setConnStatus('offline');
    renderConnectionBar();
    showToast('❌ 网络异常，数据仅保存在本地: ' + e.message, 'error');
  }
}

function githubRawUrl() {
  // raw.githubusercontent.com（永远最新，队员用）
  return `${GITHUB_RAW}/${GITHUB_REPO}/main/${getTeamDataPath()}`;
}

function purgeJsDelivrCache() {
  // 写入后刷新 jsDelivr CDN，仅作为辅助加速
  const path = getTeamDataPath();
  const purgeUrl = `https://purge.jsdelivr.net/gh/${GITHUB_REPO}@main/${path}`;
  fetch(purgeUrl).catch(() => {});
}

// 从单个 URL 尝试读取云端数据
async function tryFetchCloudData(url, headers, signal) {
  const resp = await fetch(url, { headers: headers || {}, signal });
  if (resp.status === 404) return null;
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const content = await resp.json();
  if (content && content.version && content.days) return content;
  return null;
}

// 通过 GitHub API 读取文件内容（无论有无 token）
async function fetchFromCloud(silent) {
  if (!state.teamId) return false;
  // 写入冷却期内跳过云端读取
  if (Date.now() - lastWriteTime < 30000) return false;

  let content = null;


  // 统一走 GitHub API 读取（永远最新，无 CDN 缓存问题）
  try {
    const c = new AbortController();
    const t = setTimeout(() => c.abort(), FETCH_TIMEOUT);
    const headers = githubHeaders(false);
    const resp = await fetch(githubApiUrl(), { headers, signal: c.signal });
    clearTimeout(t);
    if (resp.ok) {
      const data = await resp.json();
      // base64 解码（与上传编码对称：atob → escape → decodeURIComponent）
      const raw = decodeURIComponent(escape(atob(data.content)));
      content = JSON.parse(raw);
      if (data.sha) cloudFileSha = data.sha; // 更新 SHA
      // 读取成功
    } else if (resp.status === 403) {
      // 速率限制，等下次
      console.warn('[fetchFromCloud] GitHub API 速率限制');
    } else if (resp.status !== 404) {
      console.warn('[fetchFromCloud] GitHub API 错误:', resp.status);
    }
  } catch (e) {
    console.warn('[fetchFromCloud] GitHub API 读取失败:', e.message);
  }

  if (!content) return false;

  // 时间戳保护：云端数据比本地旧则不覆盖
  const cloudTime = content.lastModified || 0;
  const localTime = state.lastModified || 0;
  console.log('[fetchFromCloud] 来源:', source, '云端 lastModified:', new Date(cloudTime).toLocaleString(), '本地 lastModified:', new Date(localTime).toLocaleString());
  if (cloudTime < localTime) {
    console.log('[fetchFromCloud] 云端数据比本地旧，跳过覆盖');
    return false;
  }
  const cloudStr = JSON.stringify(content);
  if (cloudStr !== lastCloudFetch) {
    console.log('[fetchFromCloud] 云端数据有变化，覆盖本地');
    const localPresets = state.mistakePresets;
    const localTeamId = state.teamId;
    const localTeamName = state.teamName;
    state = content;
    if (!state.mistakePresets) state.mistakePresets = localPresets;
    state.teamId = localTeamId;
    state.teamName = localTeamName;
    saveLocal();
    lastCloudFetch = cloudStr;
    if (!silent) renderAll();
    return true;
  }
  lastCloudFetch = JSON.stringify(state);
  return false;
}

function disconnectCloud() {
  cloudConnected = false;
  state.teamId = '';
  state.teamName = '';
  // token 始终内置，不断开
  cloudFileSha = '';
  stopSyncTimer();
  saveLocal();
  setConnStatus('local', '');
  renderConnectionBar();
  showToast('已断开连接，切换至本地模式', 'info');
}

let lastWriteTime = 0; // 上次写入时间，防止轮询覆盖

function startSyncTimer() {
  stopSyncTimer();
  // 队长用短间隔，队员用长间隔
  syncTimer = setInterval(() => {
    // 写入后 30 秒内跳过轮询，避免 CDN 旧缓存覆盖新数据
    if (cloudConnected && state.teamId && Date.now() - lastWriteTime > 30000) {
      fetchFromCloud(true);
    }
  }, isCaptain() ? SYNC_INTERVAL : MEMBER_SYNC_INTERVAL);
}

function stopSyncTimer() {
  if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
}

function setConnStatus(status, extra) {
  const dot = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  const display = document.getElementById('blobIdDisplay');
  dot.className = 'conn-dot ' + status;
  const labels = {
    online: '🟢 在线同步',
    saving: '⏳ 保存中...',
    saved: '✅ 已同步',
    syncing: '🔄 同步中...',
    offline: '🔴 离线模式',
    local: '📁 本地模式'
  };
  label.textContent = labels[status] || '本地模式';
  if (state.teamId && status !== 'local') {
    display.textContent = state.teamName || state.teamId;
  } else {
    display.textContent = '';
  }
  if (status === 'online' || status === 'saved') cloudConnected = true;
  if (status === 'offline') cloudConnected = false;
}

// 显示"已同步"状态，3 秒后自动恢复为"在线"
let savedStatusTimer = null;
function showSavedStatus() {
  setConnStatus('saved');
  renderConnectionBar();
  clearTimeout(savedStatusTimer);
  savedStatusTimer = setTimeout(() => {
    if (cloudConnected) {
      setConnStatus('online');
      renderConnectionBar();
    }
  }, 3000);
}

      html += `<img class="job-icon" src="${role.iconImg}" alt="${role.label}" title="${role.fullLabel}">`;

// Global click delegation
document.getElementById('app').addEventListener('click', function(e) {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  switch (action) {

    // --- Quick Bar ---
    case 'preset-click': {
      const preset = target.dataset.preset;
      const isTeam = selectedMember === '__team__';
      if (!selectedMember) {
        showToast('请先在快速栏选择队员', 'info');
        return;
      }
      if (isTeam) {
        const day = getActiveDay();
        day.teamIssues.push({ id: generateId(), description: preset, severity: 'medium' });
      } else {
        const day = getActiveDay();
        day.members[selectedMember].mistakes.push({
          id: generateId(), description: preset, count: 1, tips: '', tipsBy: ''
        });
      }
      saveState();
      if (isTeam) renderTeamIssues(); else renderMemberCards();
      showToast(`已添加: ${isTeam ? '⚠️ 团队 · ' : selectedMember + ' · '}${preset}`, 'success');
      break;
    }

    case 'toggle-tips': {
      const entry = target.closest('.mistake-entry');
      if (!entry) return;
      entry.classList.toggle('expanded');
      break;
    }

    // --- Mistake CRUD ---
    case 'show-add-form': {
      const key = target.dataset.member;
      const card = target.closest('.member-card');
      const form = card.querySelector('.add-mistake-form');
      form.style.display = 'block';
      target.style.display = 'none';
      form.querySelector('.add-desc-input').focus();
      break;
    }

    case 'save-new-mistake': {
      const key = target.dataset.member;
      const card = target.closest('.member-card');
      const form = card.querySelector('.add-mistake-form');
      const desc = form.querySelector('.add-desc-input').value.trim();
      const count = parseInt(form.querySelector('.add-count').value) || 1;
      if (!desc) { showToast('请输入犯错描述', 'error'); return; }
      const day = getActiveDay();
      day.members[key].mistakes.push({
        id: generateId(), description: desc, count, tips: '', tipsBy: ''
      });
      saveState();
      renderMemberCards();
      showToast(`已添加 ${key} · ${desc}`, 'success');
      break;
    }

    case 'cancel-new-mistake': {
      const key = target.dataset.member;
      const card = target.closest('.member-card');
      const form = card.querySelector('.add-mistake-form');
      const btn = card.querySelector('[data-action="show-add-form"]');
      form.style.display = 'none';
      btn.style.display = '';
      form.querySelector('.add-desc-input').value = '';
      break;
    }

    case 'delete-mistake': {
      if (!confirm('确定删除这条犯错记录吗？')) return;
      const key = target.dataset.member;
      const mid = target.dataset.mistakeId;
      const day = getActiveDay();
      day.members[key].mistakes = day.members[key].mistakes.filter(m => m.id !== mid);
      saveState();
      renderMemberCards();
      showToast('已删除', 'info');
      break;
    }

    // --- Team Issues ---
    case 'delete-issue': {
      const iid = target.dataset.issueId;
      const day = getActiveDay();
      day.teamIssues = day.teamIssues.filter(i => i.id !== iid);
      saveState();
      renderTeamIssues();
      break;
    }

    // --- Preset Editor ---
    case 'remove-preset': {
      const preset = target.dataset.preset;
      state.mistakePresets = state.mistakePresets.filter(p => p !== preset);
      saveState();
      renderPresets();
      renderPresetEditor();
      break;
    }

    // --- Connection ---
    case 'copy-blob-id':
      copyBlobId();
      break;
    case 'disconnect':
      disconnectCloud();
      break;
  }
});

document.getElementById('qbDesc').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); submitQuickRecord(); }
});

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  // Don't capture when typing in inputs/textarea (except qbDesc)
  const tag = document.activeElement.tagName;
  const isEditing = (tag === 'INPUT' || tag === 'TEXTAREA') && e.target.id !== 'qbDesc' && !e.target.classList.contains('qb-desc');
  if (isEditing) return;

  const key = e.key;
  const memberKeys = { '1': 'MT', '2': 'ST', '3': 'H1', '4': 'H2', '5': 'D1', '6': 'D2', '7': 'D3', '8': 'D4' };

  if (memberKeys[key]) {
    e.preventDefault();
    selectedMember = memberKeys[key];
    document.querySelectorAll('.qb-member').forEach(b => b.classList.remove('selected'));
    const btn = document.querySelector(`.qb-member[data-member="${selectedMember}"]`);
    if (btn) btn.classList.add('selected');
    document.getElementById('qbDesc').focus();
  } else if (key === 't' || key === 'T') {
    e.preventDefault();
    selectedMember = '__team__';
    document.querySelectorAll('.qb-member').forEach(b => b.classList.remove('selected'));
    const btn = document.querySelector('.qb-member[data-member="__team__"]');
    if (btn) btn.classList.add('selected');
    document.getElementById('qbDesc').focus();
  }
});

function submitQuickRecord() {
  const desc = document.getElementById('qbDesc').value.trim();
  const count = parseInt(document.getElementById('qbCount').value) || 1;
  if (!desc) { showToast('请输入犯错描述', 'error'); return; }
  if (!selectedMember) { showToast('请先在快速栏选择队员', 'info'); return; }

  const isTeam = selectedMember === '__team__';
  const day = getActiveDay();

  if (isTeam) {
    day.teamIssues.push({ id: generateId(), description: desc, severity: 'medium' });
    renderTeamIssues();
  } else {
    day.members[selectedMember].mistakes.push({
      id: generateId(), description: desc, count, tips: '', tipsBy: ''
    });
    renderMemberCards();
  }
  saveState();
  document.getElementById('qbDesc').value = '';
  document.getElementById('qbCount').value = '1';
  document.getElementById('qbDesc').focus();
  showToast(`✅ 已记录: ${isTeam ? '团队' : selectedMember} · ${desc}`, 'success');
}

async function copyBlobId() {
  if (!state.teamId) return;
  const base = window.location.origin + window.location.pathname;
  const captainLink = base + '?team=' + encodeURIComponent(state.teamId) + '#captain';
  const memberLink = base + '?team=' + encodeURIComponent(state.teamId);
  const text = `⚔️ FFXIV 开荒记录表 — ${state.teamName || state.teamId}\n👑 队长链接(可编辑): ${captainLink}\n🧑 队员链接(仅备注): ${memberLink}`;
  try {
    await navigator.clipboard.writeText(text);
    showToast('📋 队长/队员链接已复制！发到群里即可', 'success');
  } catch (e) {
    const input = document.createElement('textarea');
    input.value = text;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
    showToast('📋 队长/队员链接已复制！', 'success');
  }
}

// --- Mini Calendar ---
let calViewYear, calViewMonth;

document.getElementById('toggleCalendarBtn').addEventListener('click', function() {
  const cal = document.getElementById('miniCalendar');
  const show = cal.hidden;
  cal.hidden = !show;
  if (show) {
    const [y, m] = activeDate.split('-');
    calViewYear = parseInt(y);
    calViewMonth = parseInt(m);
    renderCalendar();
  }
});

document.getElementById('calPrev').addEventListener('click', function() {
  calViewMonth--;
  if (calViewMonth < 1) { calViewMonth = 12; calViewYear--; }
  renderCalendar();
});

document.getElementById('calNext').addEventListener('click', function() {
  calViewMonth++;
  if (calViewMonth > 12) { calViewMonth = 1; calViewYear++; }
  renderCalendar();
});

document.getElementById('calDays').addEventListener('click', function(e) {
  const cell = e.target.closest('.cal-day');
  if (!cell || cell.classList.contains('other-month')) return;
  const iso = cell.dataset.date;
  if (!iso) return;
  activeDate = iso;
  document.getElementById('datePicker').value = activeDate;
  renderAll();
});

function renderCalendar() {
  const title = document.getElementById('calTitle');
  const grid = document.getElementById('calDays');
  title.textContent = `${calViewYear}年${calViewMonth}月`;

  const today = todayISO();
  const firstDay = new Date(calViewYear, calViewMonth - 1, 1);
  // Monday=0, Sunday=6
  let startWeekday = firstDay.getDay() - 1;
  if (startWeekday < 0) startWeekday = 6;

  const daysInMonth = new Date(calViewYear, calViewMonth, 0).getDate();
  const daysInPrevMonth = new Date(calViewYear, calViewMonth - 1, 0).getDate();

  // Days with records
  const recordedDates = new Set();
  for (const dateStr of Object.keys(state.days)) {
    const day = state.days[dateStr];
    if (day && (day.furthestPhase || day.generalNotes ||
        Object.values(day.members).some(m => m.mistakes && m.mistakes.length > 0) ||
        (day.teamIssues && day.teamIssues.length > 0))) {
      recordedDates.add(dateStr);
    }
  }

  let html = '';

  // Previous month padding
  for (let i = startWeekday - 1; i >= 0; i--) {
    const d = daysInPrevMonth - i;
    const pm = calViewMonth - 1 || 12;
    const py = calViewMonth === 1 ? calViewYear - 1 : calViewYear;
    const iso = `${py}-${String(pm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += `<span class="cal-day other-month" data-date="${iso}">${d}</span>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${calViewYear}-${String(calViewMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'cal-day';
    if (iso === today) cls += ' today';
    if (iso === activeDate) cls += ' active';
    if (recordedDates.has(iso)) cls += ' has-record';
    html += `<span class="${cls}" data-date="${iso}">${d}</span>`;
  }

  // Next month padding
  const totalCells = startWeekday + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let d = 1; d <= remaining; d++) {
    const nm = calViewMonth + 1 > 12 ? 1 : calViewMonth + 1;
    const ny = calViewMonth + 1 > 12 ? calViewYear + 1 : calViewYear;
    const iso = `${ny}-${String(nm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += `<span class="cal-day other-month" data-date="${iso}">${d}</span>`;
  }

  grid.innerHTML = html;
}

// --- Member Name Edit ---
document.getElementById('membersGrid').addEventListener('input', function(e) {

    state.memberNames[key] = e.target.value;

// --- Tips Auto-Save ---
const saveTips = debounce(function(textarea) {
  const key = textarea.dataset.member;
  const mid = textarea.dataset.mistakeId;
  const day = getActiveDay();
  const mistake = day.members[key].mistakes.find(m => m.id === mid);
  if (mistake) {
    const newTips = textarea.value;
    if (mistake.tips !== newTips) {
      mistake.tips = newTips;
      mistake.tipsBy = mistake.tipsBy || (state.memberNames[key] || key);
      saveState();
    }
  }
}, 1000);

document.getElementById('membersGrid').addEventListener('input', function(e) {
  if (e.target.classList.contains('tips-textarea')) {
    saveTips(e.target);
    // Update tips dot visibility immediately
    const entry = e.target.closest('.mistake-entry');
    if (entry) {
      const summary = entry.querySelector('.mistake-summary');
      let dot = summary.querySelector('.has-tips-dot');
      if (e.target.value.trim() && !dot) {
        dot = document.createElement('span');
        dot.className = 'has-tips-dot';
        dot.title = '有备注';
        summary.insertBefore(dot, summary.firstChild);
      } else if (!e.target.value.trim() && dot) {
        dot.remove();
      }
    }
  }
});

document.getElementById('exportBtn').addEventListener('click', function() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ffxiv-raid-data-${activeDate}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('💾 数据已导出', 'success');
});

document.getElementById('importBtn').addEventListener('click', function() {
  document.getElementById('importFileInput').click();
});

document.getElementById('importFileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.days || !imported.memberNames) throw new Error('Invalid format');
      // Merge
      Object.assign(state.days, imported.days);
      if (imported.memberNames) Object.assign(state.memberNames, imported.memberNames);
      if (imported.mistakePresets) state.mistakePresets = imported.mistakePresets;
      saveState();
      renderAll();
      const dayCount = Object.keys(imported.days).length;
      showToast(`📥 已导入 ${dayCount} 天数据`, 'success');
    } catch (err) {
      showToast('❌ 导入失败: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  this.value = '';
});

// ============================================================
// SECTION 7: SUMMARY GENERATOR
// ============================================================
function buildSummaryText(date) {
  const day = state.days[date];
  if (!day) return '该日期暂无数据。';
  const lines = [];
  lines.push(`📋 副本开荒总结 — ${date} (${formatDate(date)})`);
  lines.push('━'.repeat(46));
  lines.push('');
  lines.push(`📊 最远进度: ${day.furthestPhase || '(未记录)'}`);
  lines.push('');

  for (const group of ROLE_GROUPS) {
    const hasErrors = group.members.some(k => {
      const m = day.members[k];
      return m && m.mistakes && m.mistakes.length > 0;
    });
    if (!hasErrors) continue;

    const roleEmoji = { tank: '🛡️', healer: '💚', dps: '⚔️' };
    lines.push(`━━━ ${roleEmoji[group.role] || ''} ${group.heading} ━━━`);
    for (const key of group.members) {
      const member = day.members[key];
      if (!member) continue;
      const role = ROLES[key];
      const name = state.memberNames[key] || key;
      if (!member.mistakes || member.mistakes.length === 0) {
        lines.push(`${role.icon} ${key} — ${name}: 干净 ✨`);
      } else {
        const total = member.mistakes.reduce((s, m) => s + (m.count || 1), 0);
        lines.push(`${role.icon} ${key} — ${name}: ${total} 次犯错`);
        for (const m of member.mistakes) {
          lines.push(`  • ${m.description} (×${m.count || 1})`);
          if (m.tips && m.tips.trim()) {
            lines.push(`    ↳ 复盘: ${m.tips.trim()}`);
          }
        }
      }
    }
    lines.push('');
  }

  if (day.teamIssues && day.teamIssues.length > 0) {
    lines.push('⚠️ 团队问题:');
    for (const issue of day.teamIssues) {
      const sev = SEVERITY[issue.severity] || SEVERITY.medium;
      lines.push(`  ${sev.icon} ${sev.label.toUpperCase()} — ${issue.description}`);
    }
    lines.push('');
  }

  lines.push(`📝 备注: ${day.generalNotes || '(无)'}`);
  lines.push('');
  lines.push('Generated by FFXIV Raid Mistake Tracker');

  return lines.join('\n');
}

// ============================================================
// SECTION 8: TOAST NOTIFICATIONS
// ============================================================
function showToast(message, type) {
  type = type || 'info';
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    if (toast.parentNode) toast.remove();
  }, 3000);
}

// SECTION 9: INITIALIZATION
// ============================================================
function isCaptain() {
  return window.location.hash === '#captain';
}

function applyRole() {
  const captain = isCaptain();
  const indicator = document.getElementById('roleIndicator');
  if (captain) {
    document.body.classList.remove('member-mode');
    indicator.textContent = '👑 队长';
    indicator.className = 'captain';
    indicator.id = 'roleIndicator';
  } else {
    document.body.classList.add('member-mode');
    indicator.textContent = '🧑 队员 (仅可添加备注)';
    indicator.className = 'member';
    indicator.id = 'roleIndicator';
    const fp = document.getElementById('furthestPhase');
    const gn = document.getElementById('generalNotes');
    if (fp) fp.readOnly = true;
    if (gn) gn.readOnly = true;
  }
}

async function init() {
  loadState();

  // Read URL params: ?team=xxx & ?repo=user/repo
  const params = new URLSearchParams(window.location.search);
  const urlTeam = params.get('team') || '';
  // token 已内置，不再从 URL 读取
  const urlRepo = params.get('repo') || '';

  // 仓库地址：URL 参数优先，支持不同队伍使用不同仓库
  if (urlRepo) GITHUB_REPO = urlRepo;

  // URL params override localStorage; localStorage is fallback
  if (urlTeam) state.teamId = urlTeam;
  // token 已内置，无需从 localStorage 恢复

  applyRole();

  // Render immediately — don't block on network
  activeDate = todayISO();
  renderAll();

  // Cloud connection — async, non-blocking
  if (state.teamId) {
    // 已有 teamId 和本地数据，先标记在线（本地数据立即可用），后台同步
    cloudConnected = true;
    setConnStatus('online', '');
    renderConnectionBar();
    fetchFromCloud(false).then(changed => {
      if (changed) {
        showToast('📥 已从云端同步最新数据', 'info');
        renderAll();
      }
      cloudConnected = true;
      setConnStatus('online', '');
      renderConnectionBar();
      startSyncTimer();
    }).catch(e => {
      setConnStatus('online', '');
      renderConnectionBar();
      startSyncTimer();
    });
  } else if (isCaptain()) {
    // Captain with no team — auto create
      state.teamId = 'team-' + Date.now().toString(36);
      if (!state.teamName) state.teamName = '我的队伍';
      saveLocal();
      setConnStatus('syncing', '创建记录本...');
      renderConnectionBar();
      syncToCloud().then(() => {
        cloudConnected = true;
        setConnStatus('online', '');
        renderConnectionBar();
        startSyncTimer();
        const url = new URL(window.location);
        url.searchParams.set('team', state.teamId);
        window.history.replaceState({}, '', url);
        showToast('✅ 在线记录本已创建！点击「📋 复制分享链接」发给队员', 'success');
      }).catch(e => {
        setConnStatus('local', '');
        renderConnectionBar();
        showToast('❌ 创建失败: ' + e.message, 'error');
      });
  } else {
    // Member with no team
    setConnStatus('local', '');
    renderConnectionBar();
    showToast('⚠️ 未检测到队伍，请使用队长分享的链接打开', 'info');
  }
}

// Listen for hash changes
window.addEventListener('hashchange', function() {
  applyRole();
  renderAll();
});

document.addEventListener('DOMContentLoaded', init);

// ============================================================
// Debug helper (accessible from console)
// ============================================================
window.__ffxivTracker = {
  state: () => state,
  reset: () => {
    if (confirm('确定要清除所有本地数据吗？此操作不可撤销。')) {
      state = createEmptyState();
      saveLocal();
      cloudConnected = false;
      stopSyncTimer();
      activeDate = todayISO();
      setConnStatus('local', '');
      renderAll();
      showToast('⚠️ 数据已重置', 'info');
    }
  },
  forceSync: () => syncToCloud(),
  forceFetch: () => fetchFromCloud(false),
};
</script>
