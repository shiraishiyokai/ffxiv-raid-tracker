<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><!-- v2 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFXIV 副本开荒犯错记录表</title>
<style>
/* ============================================================
   CSS Variables — FFXIV Dark Theme
   ============================================================ */
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-card: #1f2b47;
  --bg-card-hover: #263355;
  --bg-input: #0f1629;
  --bg-expand: #182032;
  --bg-modal-overlay: rgba(0,0,0,0.75);
  --bg-toast: #1f2b47;

  --text-primary: #e8e6e3;
  --text-secondary: #b0b0c0;
  --text-muted: #7a7a90;

  --accent-gold: #c9a44b;
  --accent-gold-dim: #a07d30;
  --accent-blue: #4a9eff;
  --accent-green: #2ecc71;
  --accent-red: #e74c3c;
  --accent-orange: #e67e22;
  --accent-yellow: #f39c12;

  --role-tank: #4169e1;
  --role-healer: #2ecc71;
  --role-dps: #e74c3c;

  --severity-low: #2ecc71;
  --severity-medium: #f39c12;
  --severity-high: #e67e22;
  --severity-critical: #e74c3c;

  --border-color: #2a3050;
  --border-radius: 8px;
  --border-radius-sm: 5px;
  --shadow-card: 0 2px 10px rgba(0,0,0,0.35);
  --shadow-elevated: 0 6px 24px rgba(0,0,0,0.5);

  --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', 'SF Mono', monospace;

  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 20px;
  --space-xl: 28px;

  --transition-fast: 120ms ease;
  --transition-normal: 220ms ease;
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
::selection { background: var(--accent-gold); color: var(--bg-primary); }

/* ============================================================
   App Container
   ============================================================ */
#app {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--space-md) var(--space-md) 80px;
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}

/* ============================================================
   Header
   ============================================================ */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: var(--space-md);
  padding-bottom: var(--space-md);
  border-bottom: 2px solid var(--accent-gold);
}
.title {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent-gold);
  letter-spacing: 0.5px;
  text-shadow: 0 0 20px rgba(201,164,75,0.3);
}
.title-icon { margin-right: 6px; }
.header-actions { display: flex; gap: var(--space-sm); flex-wrap: wrap; align-items: center; }

/* Role Indicator */
#roleIndicator {
  font-size: 0.82rem; font-weight: 700; padding: 3px 12px;
  border-radius: 10px; white-space: nowrap;
}
#roleIndicator.captain { background: var(--accent-gold); color: var(--bg-primary); }
#roleIndicator.member { background: var(--accent-blue); color: #fff; }

/* Captain-only elements: hidden when member mode */
body.member-mode .captain-only { display: none !important; }

/* ============================================================
   Buttons
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px;
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius-sm);
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
  user-select: none;
  font-family: inherit;
}
.btn:hover { background: var(--bg-card-hover); border-color: var(--accent-gold-dim); }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent-gold); color: var(--bg-primary); border-color: var(--accent-gold); font-weight: 600; }
.btn-primary:hover { background: var(--accent-gold-dim); }
.btn-danger { color: var(--accent-red); border-color: var(--accent-red); }
.btn-danger:hover { background: var(--accent-red); color: #fff; }
.btn-small { padding: 3px 10px; font-size: 0.78rem; }
.btn-large { padding: 10px 28px; font-size: 1rem; }
.btn-icon { padding: 6px 10px; font-size: 0.9rem; }
.btn-active { background: var(--accent-gold); color: var(--bg-primary); border-color: var(--accent-gold); }

/* ============================================================
   Connection Bar
   ============================================================ */
#connectionBar {
  display: flex; align-items: center; flex-wrap: wrap; gap: var(--space-sm);
  padding: 8px 12px;
  background: var(--bg-secondary);
  border-radius: var(--border-radius);
  font-size: 0.85rem;
}
#connectionBar .conn-status { display: flex; align-items: center; gap: 4px; }
#connectionBar .conn-dot { width: 9px; height: 9px; border-radius: 50%; }
.conn-dot.online { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
.conn-dot.saving { background: var(--accent-yellow); animation: pulse 0.6s ease infinite; }
.conn-dot.saved { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
.conn-dot.syncing { background: var(--accent-yellow); animation: pulse 0.8s ease infinite; }
.conn-dot.offline { background: var(--accent-red); }
.conn-dot.local { background: var(--text-muted); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#blobIdDisplay {
  font-family: var(--font-mono); font-weight: 600; color: var(--accent-blue);
  background: var(--bg-input); padding: 2px 8px; border-radius: 4px;
  font-size: 0.8rem;
}
#connActions { display: flex; gap: var(--space-sm); margin-left: auto; }

/* ============================================================
   Quick Record Bar — Sticky
   ============================================================ */
#quickBar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(22,33,62,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  padding: var(--space-sm) var(--space-md);
  display: flex; flex-direction: column; gap: 6px;
}
#quickBar .member-selector {
  display: flex; gap: 4px; flex-wrap: wrap;
}
#quickBar .qb-member {
  padding: 4px 10px; border-radius: var(--border-radius-sm);
  border: 1px solid var(--border-color);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer; font-size: 0.78rem; font-weight: 600;
  transition: all var(--transition-fast);
  user-select: none;
  font-family: inherit;
}
#quickBar .qb-member:hover { background: var(--bg-card-hover); color: var(--text-primary); }
#quickBar .qb-member.selected { border-color: var(--accent-gold); background: var(--accent-gold); color: var(--bg-primary); }
#quickBar .qb-member.role-tank { border-left: 3px solid var(--role-tank); }
#quickBar .qb-member.role-healer { border-left: 3px solid var(--role-healer); }
#quickBar .qb-member.role-dps { border-left: 3px solid var(--role-dps); }
#quickBar .qb-member.role-team { border-left: 3px solid var(--accent-orange); }
#quickBar .qb-member .job-icon {
  width: 22px; height: 22px; vertical-align: middle;
  border-radius: 3px; object-fit: contain; margin-right: 2px;
  filter: brightness(0.9);
  transition: filter var(--transition-fast);
}
#quickBar .qb-member:hover .job-icon,
#quickBar .qb-member.selected .job-icon { filter: brightness(1.1); }
#quickBar .qb-input-row { display: flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap; }
#quickBar .qb-desc {
  flex: 1; min-width: 150px;
  padding: 6px 10px; border-radius: var(--border-radius-sm);
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color);
  font-size: 0.85rem; font-family: inherit;
  transition: border-color var(--transition-fast);
}
#quickBar .qb-desc:focus { outline: none; border-color: var(--accent-gold); }
#quickBar .qb-count {
  width: 56px; padding: 6px 4px; text-align: center;
  border-radius: var(--border-radius-sm);
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color);
  font-size: 0.85rem; font-family: inherit;
}
#quickBar .qb-count:focus { outline: none; border-color: var(--accent-gold); }
#quickBar .qb-presets { display: flex; gap: 4px; flex-wrap: wrap; }
#quickBar .qb-preset {
  padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;
  background: var(--bg-card); color: var(--text-secondary);
  border: 1px solid var(--border-color); cursor: pointer;
  transition: all var(--transition-fast); user-select: none; font-family: inherit;
}
#quickBar .qb-preset:hover { background: var(--bg-card-hover); color: var(--accent-gold); border-color: var(--accent-gold-dim); }
#quickBar .qb-hint { font-size: 0.7rem; color: var(--text-muted); }
#quickBar .qb-hint kbd {
  background: var(--bg-input); padding: 1px 5px; border-radius: 3px;
  border: 1px solid var(--border-color); font-family: var(--font-mono); font-size: 0.7rem;
}

/* ============================================================
   Day Navigation
   ============================================================ */
#dayNav {
  display: flex; align-items: center; gap: var(--space-sm); flex-wrap: wrap;
}
#dayNav .date-input {
  padding: 6px 10px; border-radius: var(--border-radius-sm);
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color);
  font-size: 0.9rem; font-family: inherit; cursor: pointer;
}
#dayNav .date-input:focus { outline: none; border-color: var(--accent-gold); }
#dayNav .day-label { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); min-width: 100px; text-align: center; }

/* ============================================================
   Day Summary Card
   ============================================================ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  padding: var(--space-lg);
}
.card h2 {
  font-size: 1rem; font-weight: 600; color: var(--accent-gold);
  margin-bottom: var(--space-md);
  letter-spacing: 0.5px;
}
.form-group { margin-bottom: var(--space-md); }
.form-group:last-child { margin-bottom: 0; }
.form-group label {
  display: block; font-size: 0.82rem; font-weight: 600;
  color: var(--text-secondary); margin-bottom: 4px;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 8px 12px; border-radius: var(--border-radius-sm);
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color);
  font-size: 0.9rem; font-family: inherit;
  transition: border-color var(--transition-fast);
  resize: vertical;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none; border-color: var(--accent-gold);
}

/* ============================================================
   Member Cards Grid
   ============================================================ */
.role-section { margin-bottom: var(--space-lg); }
.role-section:last-child { margin-bottom: 0; }
.role-heading {
  font-size: 0.9rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: var(--space-md);
  padding-left: var(--space-md); border-left: 3px solid var(--accent-gold);
}
.role-heading.tank { color: var(--role-tank); border-left-color: var(--role-tank); }
.role-heading.healer { color: var(--role-healer); border-left-color: var(--role-healer); }
.role-heading.dps { color: var(--role-dps); border-left-color: var(--role-dps); }
.role-heading.team { color: var(--accent-orange); border-left-color: var(--accent-orange); }

.member-cards {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: var(--space-md);
}

.member-card {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: var(--border-radius); overflow: hidden;
  transition: all var(--transition-normal);
}
.member-card:hover { border-color: var(--accent-gold-dim); box-shadow: var(--shadow-elevated); }
.member-card .card-header {
  padding: var(--space-md); display: flex; align-items: center;
  justify-content: space-between; gap: var(--space-sm);
  border-bottom: 1px solid var(--border-color);
  cursor: default;
}
.member-card .card-header.role-tank { border-left: 4px solid var(--role-tank); }
.member-card .card-header.role-healer { border-left: 4px solid var(--role-healer); }
.member-card .card-header.role-dps { border-left: 4px solid var(--role-dps); }
.member-card .member-icon { font-size: 1.3rem; }
.member-card .job-icon {
  width: 38px; height: 38px; object-fit: contain;
  border-radius: 5px; flex-shrink: 0;
  filter: drop-shadow(0 0 4px rgba(201,164,75,0.25));
  transition: filter var(--transition-fast);
}
.member-card:hover .job-icon { filter: drop-shadow(0 0 8px rgba(201,164,75,0.5)); }
.member-card .member-info { flex: 1; min-width: 0; }
.member-card .member-role { font-weight: 700; font-size: 0.85rem; color: var(--text-secondary); }
.member-card .member-name-input {
  background: transparent; border: 1px solid transparent; color: var(--text-primary);
  font-size: 0.95rem; font-weight: 600; padding: 2px 4px; border-radius: 3px;
  font-family: inherit; flex: 1; min-width: 0; max-width: 120px; cursor: pointer;
  transition: all var(--transition-fast);
}
.member-card .member-name-input:hover { border-color: var(--border-color); }
.member-card .member-name-input:focus { border-color: var(--accent-gold); outline: none; cursor: text; background: var(--bg-input); }
.member-card .member-name-input.member-readonly { border: none; cursor: default; pointer-events: none; opacity: 0.9; }
.member-card .member-name-row { display: flex; gap: 6px; align-items: center; flex: 1; min-width: 0; }
.member-card .job-select {
  font-size: 0.72rem; padding: 2px 4px; border-radius: 4px;
  background: var(--bg-input); color: var(--text-secondary); border: 1px solid var(--border-color);
  cursor: pointer; flex-shrink: 0;
}
.member-card .job-select.member-readonly { border: none; background: transparent; pointer-events: none; opacity: 0.8; -webkit-appearance: none; appearance: none; }
.member-card .job-select:focus { outline: none; border-color: var(--accent-gold); }
.member-card .badge {
  font-size: 0.75rem; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; background: var(--bg-input);
}
.member-card .badge.has-mistakes { background: var(--accent-red); color: #fff; }
.member-card .badge.clean { background: var(--accent-green); color: #fff; }

.member-card .mistake-list {
  padding: var(--space-sm) var(--space-md); list-style: none;
  display: flex; flex-direction: column; gap: 2px;
}
.member-card .mistake-list:empty::after {
  content: '暂无记录'; display: block; text-align: center;
  color: var(--text-muted); font-size: 0.8rem; padding: var(--space-sm) 0;
}

/* Mistake Entry */
.mistake-entry { border-radius: var(--border-radius-sm); overflow: hidden; }
.mistake-entry .mistake-summary {
  display: flex; align-items: center; gap: var(--space-sm);
  padding: 6px 8px; border-radius: var(--border-radius-sm);
  cursor: pointer; transition: background var(--transition-fast);
  font-size: 0.83rem;
}
.mistake-entry .mistake-summary:hover { background: var(--bg-card-hover); }
.mistake-entry .mistake-desc { flex: 1; min-width: 0; word-break: break-word; }
.mistake-entry .mistake-count { font-weight: 700; color: var(--accent-gold); white-space: nowrap; }
.mistake-entry .expand-icon {
  font-size: 0.6rem; color: var(--text-muted); transition: transform var(--transition-fast);
  flex-shrink: 0;
}
.mistake-entry.expanded .expand-icon { transform: rotate(90deg); }
.mistake-entry .has-tips-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent-blue);
  flex-shrink: 0;
}

.mistake-entry .mistake-detail {
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s ease, padding 0.35s ease;
  padding: 0 12px;
}
.mistake-entry.expanded .mistake-detail {
  max-height: 300px;
}
.mistake-entry .mistake-detail-inner {
  padding: var(--space-sm) 0;
  display: flex; flex-direction: column; gap: var(--space-sm);
}
.mistake-entry .tips-textarea {
  width: 100%; min-height: 60px; padding: 8px 10px;
  border-radius: var(--border-radius-sm); font-size: 0.8rem;
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color);
  font-family: inherit; resize: vertical;
  transition: border-color var(--transition-fast);
}
.mistake-entry .tips-textarea:focus { outline: none; border-color: var(--accent-gold); }
.mistake-entry .tips-meta {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.72rem; color: var(--text-muted); flex-wrap: wrap; gap: var(--space-sm);
}
.mistake-entry .tips-by { font-style: italic; }

/* Add mistake inline form */
.add-mistake-form {
  padding: 8px 12px; display: flex; flex-direction: column; gap: 6px;
}
.add-mistake-form input, .add-mistake-form textarea {
  padding: 6px 10px; border-radius: var(--border-radius-sm);
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-color); font-size: 0.82rem; font-family: inherit;
}
.add-mistake-form input:focus, .add-mistake-form textarea:focus { outline: none; border-color: var(--accent-gold); }
.add-mistake-form .add-row { display: flex; gap: var(--space-sm); align-items: center; }
.add-mistake-form .add-count { width: 52px; }

/* ============================================================
   Team Issues
   ============================================================ */
#teamIssues .issue-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: var(--space-md); }
#teamIssues .issue-list:empty::after {
  content: '暂无团队问题'; display: block; text-align: center;
  color: var(--text-muted); font-size: 0.82rem; padding: var(--space-sm) 0;
}
.issue-entry {
  display: flex; align-items: center; gap: var(--space-sm);
  padding: 6px 10px; background: var(--bg-input); border-radius: var(--border-radius-sm);
  font-size: 0.85rem;
}
.issue-entry .issue-sev { font-weight: 700; font-size: 0.75rem; white-space: nowrap; }
.issue-entry .issue-desc { flex: 1; min-width: 0; word-break: break-word; }
.sev-low { color: var(--severity-low); }
.sev-medium { color: var(--severity-medium); }
.sev-high { color: var(--severity-high); }
.sev-critical { color: var(--severity-critical); }

.add-issue-form {
  display: flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap;
}
.add-issue-form input { flex:1; min-width:150px; }
.add-issue-form select { width: 100px; }

/* ============================================================
   Bottom Actions
   ============================================================ */
#bottomActions {
  display: flex; gap: var(--space-sm); flex-wrap: wrap; justify-content: center;
}

/* ============================================================
   Modal
   ============================================================ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg-modal-overlay);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  padding: var(--space-lg);
}
.modal-overlay:not([hidden]) {
  display: flex;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-content {
  background: var(--bg-secondary); border: 1px solid var(--accent-gold);
  border-radius: var(--border-radius); padding: var(--space-xl);
  max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto;
  animation: modalIn 0.25s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-content h2 { color: var(--accent-gold); margin-bottom: var(--space-lg); font-size: 1.1rem; }
.modal-content pre {
  background: var(--bg-input); padding: var(--space-lg); border-radius: var(--border-radius-sm);
  font-family: var(--font-mono); font-size: 0.82rem; line-height: 1.7;
  color: var(--text-primary); white-space: pre-wrap; word-break: break-word;
  max-height: 50vh; overflow-y: auto; border: 1px solid var(--border-color);
}
.modal-actions {
  display: flex; gap: var(--space-sm); justify-content: flex-end; margin-top: var(--space-lg);
}

/* ============================================================
   Toast
   ============================================================ */
.toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 300;
  display: flex; flex-direction: column-reverse; gap: var(--space-sm);
}
.toast {
  padding: 10px 18px; border-radius: var(--border-radius-sm);
  background: var(--bg-toast); color: var(--text-primary);
  border: 1px solid var(--border-color); font-size: 0.85rem;
  box-shadow: var(--shadow-elevated);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
  max-width: 340px;
}
@keyframes toastIn { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
@keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(60px); } }
.toast.success { border-left: 3px solid var(--accent-green); }
.toast.error { border-left: 3px solid var(--accent-red); }
.toast.info { border-left: 3px solid var(--accent-blue); }

/* ============================================================
   Preset Editor
   ============================================================ */
#presetEditor { margin-top: var(--space-sm); display: none; flex-wrap: wrap; gap: var(--space-sm); align-items: center; }
#presetEditor.open { display: flex; }
#presetEditor input { flex: 1; min-width: 120px; }
#presetEditor .preset-tags { display: flex; gap:4px; flex-wrap:wrap; }
#presetEditor .preset-tag {
  display: inline-flex; align-items: center; gap:2px;
  padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;
  background: var(--bg-input); color: var(--text-secondary);
  border: 1px solid var(--border-color);
}
#presetEditor .preset-tag .preset-remove { cursor: pointer; color: var(--accent-red); font-weight: 700; margin-left: 2px; }

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 900px) {
  .member-cards { grid-template-columns: repeat(2, 1fr); }
  #header { flex-direction: column; align-items: flex-start; }
  #quickBar .qb-input-row { flex-direction: column; align-items: stretch; }
  #quickBar .qb-count { width: 100%; }
}
@media (max-width: 560px) {
  html { font-size: 14px; }
  .member-cards { grid-template-columns: 1fr; }
  #app { padding: var(--space-sm); gap: var(--space-md); }
  #dayNav { justify-content: center; }
  #connectionBar { flex-direction: column; align-items: stretch; }
  #connActions { margin-left: 0; justify-content: flex-end; }
  .modal-content { padding: var(--space-md); }
}

/* ============================================================
   Mini Calendar
   ============================================================ */
#miniCalendar { padding: var(--space-md); max-width: 400px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-sm); }
.cal-title { font-weight: 700; font-size: 0.95rem; color: var(--accent-gold); }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day {
  position: relative; text-align: center; padding: 6px 2px; border-radius: var(--border-radius-sm);
  font-size: 0.82rem; cursor: pointer; transition: all var(--transition-fast);
  color: var(--text-secondary); user-select: none;
}
.cal-day:hover { background: var(--bg-card-hover); }
.cal-day.today { color: var(--accent-gold); font-weight: 700; }
.cal-day.active { background: var(--accent-gold); color: var(--bg-primary); font-weight: 700; border-radius: var(--border-radius-sm); }
.cal-day.other-month { color: var(--text-muted); opacity: 0.4; }
.cal-day.has-record::after {
  content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
  width: 5px; height: 5px; border-radius: 50%; background: var(--accent-green);
}
.cal-day.active.has-record::after { background: var(--bg-primary); }
.cal-day.has-record { color: var(--text-primary); font-weight: 600; }
.cal-note { font-size: 0.7rem; color: var(--text-muted); margin-top: var(--space-sm); text-align: center; }

/* ============================================================
   FFLogs Section
   ============================================================ */
#fflogsSection { display: flex; flex-direction: column; gap: var(--space-md); }
.fflogs-url-row { display: flex; gap: var(--space-sm); align-items: center; }
.fflogs-url-input { flex: 1; min-width: 0; }
.fflogs-import-btn { white-space: nowrap; }
.fflogs-status { font-size: 0.85rem; color: var(--text-muted); padding: var(--space-sm) 0; }
.fflogs-status.loading { color: var(--accent-blue); }
.fflogs-status.error { color: var(--accent-red); }
.fflogs-status.success { color: var(--accent-green); }

.fflogs-summary-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: var(--space-sm); margin-bottom: var(--space-md);
}
.fflogs-stat { background: var(--bg-input); border-radius: var(--border-radius-sm); padding: var(--space-sm) var(--space-md); text-align: center; }
.fflogs-stat-label { font-size: 0.75rem; color: var(--text-muted); display: block; }
.fflogs-stat-value { font-size: 1.1rem; font-weight: 600; color: var(--accent-gold); display: block; }

.fflogs-death-table {
  display: grid; grid-template-columns: repeat(8, 1fr);
  gap: var(--space-sm); margin-bottom: var(--space-md);
}
.fflogs-death-cell { background: var(--bg-input); border-radius: var(--border-radius-sm); padding: var(--space-sm); text-align: center; }
.fflogs-death-cell .pos-label { font-size: 0.75rem; color: var(--text-muted); }
.fflogs-death-cell .death-count { font-size: 1.1rem; font-weight: 600; }
.fflogs-death-cell .death-count.zero { color: var(--accent-green); }
.fflogs-death-cell .death-count.low { color: var(--text-primary); }
.fflogs-death-cell .death-count.high { color: var(--accent-orange); }
.fflogs-death-cell .death-count.very-high { color: var(--accent-red); }

.fflogs-mapping-panel { background: var(--bg-input); border-radius: var(--border-radius); padding: var(--space-md); margin-top: var(--space-md); }
.fflogs-mapping-rows { display: flex; flex-direction: column; gap: var(--space-sm); }
.fflogs-mapping-row { display: flex; align-items: center; gap: var(--space-sm); }
.fflogs-mapping-row .player-name { font-weight: 600; min-width: 80px; }
.fflogs-mapping-row .player-job { color: var(--text-muted); font-size: 0.85rem; min-width: 60px; }
.fflogs-mapping-row select { width: 80px; }
.fflogs-mapping-row.conflict { background: rgba(231,76,60,0.15); border-radius: var(--border-radius-sm); padding: var(--space-xs); }
.fflogs-mapping-actions { display: flex; gap: var(--space-sm); justify-content: flex-end; margin-top: var(--space-md); }

.fflogs-boss-select-panel { background: var(--bg-input); border-radius: var(--border-radius); padding: var(--space-md); margin-top: var(--space-md); }
.fflogs-boss-list { display: flex; flex-direction: column; gap: var(--space-sm); margin-bottom: var(--space-md); }
.fflogs-boss-item { display: flex; align-items: center; gap: var(--space-sm); cursor: pointer; padding: var(--space-sm); border-radius: var(--border-radius-sm); background: var(--bg-card); transition: background var(--transition-fast); }
.fflogs-boss-item:hover { background: var(--bg-card-hover); }
.fflogs-boss-item.selected { background: var(--accent-gold); color: var(--bg-primary); }
.fflogs-boss-name { font-weight: 600; }
.fflogs-boss-count { color: var(--text-muted); font-size: 0.85rem; }

.fflogs-timeline { position: relative; margin-top: var(--space-md); }
.fflogs-timeline-row { position: relative; height: 24px; border-bottom: 1px solid var(--border-color); }
.fflogs-timeline-row-label { position: absolute; left: 0; top: 2px; font-size: 0.75rem; color: var(--text-muted); width: 80px; white-space: nowrap; overflow: hidden; }
.fflogs-timeline-track { position: absolute; left: 85px; right: 0; top: 0; height: 24px; }
.fflogs-timeline-marker {
  position: absolute; width: 8px; height: 8px; border-radius: 50%;
  top: 8px; transform: translateX(-50%); cursor: pointer; z-index: 2;
  transition: transform var(--transition-fast);
}
.fflogs-timeline-marker:hover { transform: translateX(-50%) scale(1.8); z-index: 3; }
.fflogs-timeline-separator {
  position: absolute; width: 1px; height: 24px; top: 0;
  background: var(--border-color); z-index: 1;
}
.fflogs-timeline-sep-label { position: absolute; top: -14px; font-size: 0.65rem; color: var(--text-muted); transform: translateX(-50%); }
.fflogs-timeline-time-axis { position: relative; height: 20px; margin-left: 85px; border-top: 1px solid var(--border-color); }
.fflogs-timeline-time-label { position: absolute; font-size: 0.65rem; color: var(--text-muted); transform: translateX(-50%); top: 2px; }

.fflogs-tooltip {
  position: fixed; background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: var(--border-radius-sm); padding: var(--space-sm) var(--space-md);
  font-size: 0.85rem; z-index: 1000; pointer-events: none;
  box-shadow: var(--shadow-elevated); max-width: 300px;
}

.fflogs-fight-list { margin-top: var(--space-sm); }
.fflogs-fight-row { display: grid; grid-template-columns: 30px 50px 50px 50px 70px 60px; gap: var(--space-sm); padding: var(--space-xs) 0; font-size: 0.85rem; border-bottom: 1px solid var(--border-color); }
.fflogs-fight-row.header { color: var(--text-muted); font-weight: 600; }
.fflogs-fight-kill { color: var(--accent-green); }
.fflogs-fight-wipe { color: var(--accent-red); }

.fflogs-actions { display: flex; gap: var(--space-sm); margin-top: var(--space-md); }

@media (max-width: 768px) {
  .fflogs-summary-grid { grid-template-columns: repeat(2, 1fr); }
  .fflogs-death-table { grid-template-columns: repeat(4, 1fr); }
  .fflogs-timeline-row-label { width: 50px; font-size: 0.65rem; }
  .fflogs-timeline-track { left: 55px; }
  .fflogs-timeline-time-axis { margin-left: 55px; }
}
@media (max-width: 480px) {
  .fflogs-summary-grid { grid-template-columns: 1fr 1fr; }
  .fflogs-death-table { grid-template-columns: repeat(2, 1fr); }
}

<div id="app">
  <!-- Header -->
  <header id="header">
    <h1 class="title"><span class="title-icon">⚔️</span>FFXIV 副本开荒犯错记录表</h1>
    <div class="header-actions">
      <span id="roleIndicator"></span>
      <button id="exportBtn" class="btn captain-only">💾 导出备份</button>
      <button id="importBtn" class="btn captain-only">📥 导入数据</button>
    </div>
  </header>

  <!-- Connection Bar -->
  <div id="connectionBar">
    <span class="conn-status"><span id="connDot" class="conn-dot local"></span><span id="connLabel">本地模式</span></span>
    <span id="blobIdDisplay"></span>
    <span id="connActions">
      <button id="manualSyncBtn" class="btn btn-small btn-primary" style="display:none;">☁️ 保存到云端</button>
      <button id="copyBlobIdBtn" class="btn btn-small captain-only" style="display:none;">📋 复制分享链接</button>
      <button id="newTeamBtn" class="btn btn-small captain-only">🆕 新建队伍</button>
      <button id="disconnectBtn" class="btn btn-small btn-danger captain-only" style="display:none;">断开</button>
    </span>
  </div>


  <!-- Quick Record Bar -->
  <div id="quickBar" class="captain-only">
    <div class="member-selector" id="qbMemberSelector">
      <button class="qb-member role-tank" data-member="MT" id="qbMT"></button>
      <button class="qb-member role-tank" data-member="ST" id="qbST"></button>
      <button class="qb-member role-healer" data-member="H1" id="qbH1"></button>
      <button class="qb-member role-healer" data-member="H2" id="qbH2"></button>
      <button class="qb-member role-dps" data-member="D1" id="qbD1"></button>
      <button class="qb-member role-dps" data-member="D2" id="qbD2"></button>
      <button class="qb-member role-dps" data-member="D3" id="qbD3"></button>
      <button class="qb-member role-dps" data-member="D4" id="qbD4"></button>
      <button class="qb-member role-team" data-member="__team__">⚠️ 团队</button>
    </div>
    <div class="qb-input-row">
      <input type="text" class="qb-desc" id="qbDesc" placeholder="犯错描述... (Enter 提交)" maxlength="200">
      <input type="number" class="qb-count" id="qbCount" value="1" min="1" max="99">
      <button class="btn btn-primary btn-small" id="qbSubmit">✓ 添加</button>
      <span class="qb-hint">快捷键: <kbd>1</kbd>-<kbd>8</kbd> 选队员, <kbd>T</kbd> 团队, <kbd>Enter</kbd> 提交</span>
    </div>
    <div class="qb-presets" id="qbPresets"></div>
    <button class="btn btn-small" id="togglePresetEditor" style="display:none;">⚙ 编辑预设</button>
    <div id="presetEditor">
      <input type="text" id="newPresetInput" placeholder="新预设名称" maxlength="20">
      <button class="btn btn-small" id="addPresetBtn">+ 添加</button>
      <div class="preset-tags" id="presetTags"></div>
      <button class="btn btn-small" id="closePresetEditor">完成</button>
    </div>
  </div>

  <!-- Day Navigation -->
  <nav id="dayNav">
    <button id="prevDay" class="btn btn-icon">◀</button>
    <input type="date" id="datePicker" class="date-input">
    <span class="day-label" id="dayLabel"></span>
    <button id="nextDay" class="btn btn-icon">▶</button>
    <button id="todayBtn" class="btn">📅 今天</button>
    <button id="toggleCalendarBtn" class="btn">🗓 日历</button>
  </nav>

  <!-- Mini Calendar -->
  <div id="miniCalendar" class="card" hidden>
    <div class="cal-header">
      <button id="calPrev" class="btn btn-icon btn-small">◀</button>
      <span id="calTitle" class="cal-title"></span>
      <button id="calNext" class="btn btn-icon btn-small">▶</button>
    </div>
    <div class="cal-weekdays">
      <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    <div class="cal-days" id="calDays"></div>
    <div class="cal-note">💡 凌晨4:00前仍记为前一天</div>
  </div>

  <!-- Day Summary -->
  <section id="daySummary" class="card">
    <div class="form-group">
      <label for="furthestPhase">📊 最远进度</label>
      <input type="text" id="furthestPhase" placeholder="例如: P2 - Limit Cut / 狂暴 1%">
    </div>
    <div class="form-group">
      <label for="generalNotes">📝 当日备注</label>
      <textarea id="generalNotes" rows="2" placeholder="关于本次开荒的整体备注..."></textarea>
    </div>
  </section>

  <!-- FFLogs Data Import -->
  <section id="fflogsSection" class="card" style="display:none;">
    <h2>📊 FFLogs 数据导入</h2>
    <div class="fflogs-url-row captain-only">
      <input type="text" id="fflogsUrlInput" class="fflogs-url-input"
             placeholder="粘贴 FFLogs 报告链接... (如 https://cn.fflogs.com/reports/xxx?fight=6)">
      <button id="fflogsImportBtn" class="btn btn-primary fflogs-import-btn">📥 导入</button>
    </div>
    <div id="fflogsImportStatus" class="fflogs-status" style="display:none;"></div>
    <div id="fflogsBossSelectPanel" class="fflogs-boss-select-panel" style="display:none;"></div>
    <div id="fflogsMappingPanel" class="fflogs-mapping-panel" style="display:none;"></div>
    <div id="fflogsDataDisplay" style="display:none;">
      <div class="fflogs-summary-grid" id="fflogsSummaryGrid"></div>
      <div id="fflogsDeathTable" class="fflogs-death-table"></div>
      <div id="fflogsTimelineContainer" class="fflogs-timeline">
        <h3 style="font-size:0.95rem; margin-bottom:var(--space-sm);">🎯 技能释放时间轴</h3>
        <div id="fflogsTimeline"></div>
      </div>
      <details id="fflogsFightList">
        <summary style="font-size:0.85rem; cursor:pointer; color:var(--text-secondary);">📋 详细战斗列表</summary>
        <div id="fflogsFightListContent" class="fflogs-fight-list"></div>
      </details>
      <div class="fflogs-actions captain-only">
        <button id="fflogsAutoFillBtn" class="btn btn-primary">🔄 同步最远进度到手动记录</button>
        <button id="fflogsClearBtn" class="btn btn-danger">🗑 清除 FFLogs 数据</button>
      </div>
    </div>
  </section>

  <!-- Member Grid -->
  <section id="membersGrid"></section>

  <!-- Team Issues -->
  <section id="teamIssues" class="card">
    <h2>⚠️ 团队问题</h2>
    <ul class="issue-list" id="issueList"></ul>
    <div class="add-issue-form captain-only" id="addIssueForm">
      <input type="text" id="newIssueDesc" placeholder="团队问题描述..." maxlength="200">
      <select id="newIssueSev">
        <option value="low">🟢 低</option>
        <option value="medium" selected>🟡 中</option>
        <option value="high">🟠 高</option>
        <option value="critical">🔴 严重</option>
      </select>
      <button class="btn btn-small" id="addIssueBtn">+ 添加</button>
    </div>
  </section>

  <!-- Bottom Actions -->
  <div id="bottomActions">
    <button id="generateSummaryBtn" class="btn btn-primary btn-large captain-only">📋 生成当日总结</button>
  </div>
</div>

<!-- Summary Modal -->
<div id="summaryModal" class="modal-overlay" hidden>
  <div class="modal-content">
    <h2>📋 当日犯错总结</h2>
    <pre id="summaryText"></pre>
    <div class="modal-actions">
      <button id="copySummaryBtn" class="btn btn-primary">📋 复制到剪贴板</button>
      <button id="closeModalBtn" class="btn">关闭</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Hidden file input -->
<input type="file" id="importFileInput" accept=".json" hidden>

function generateId() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) {
    return crypto.randomUUID();
  }
  return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
}

function escapeHtml(str) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
  return String(str).replace(/[&<>"']/g, c => map[c]);
}

function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}

function formatDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  const weekdays = ['日','一','二','三','四','五','六'];
  const w = new Date(iso + 'T00:00:00').getDay();
  return `${y}年${parseInt(m)}月${parseInt(d)}日 周${weekdays[w]}`;
}

function todayISO() {
  // FFXIV raid day: before 4:00 AM still counts as previous day
  const d = new Date();
  if (d.getHours() < 4) {
    d.setDate(d.getDate() - 1);
  }
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function isoAddDays(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

        console.log('[loadState] 从 localStorage 加载，lastModified:', new Date(state.lastModified || 0).toLocaleString(), '天数:', Object.keys(state.days).length);
        // migration for new fields
        if (!state.mistakePresets) state.mistakePresets = [...DEFAULT_PRESETS];
        if (!state.teamId) state.teamId = '';
        if (!state.teamName) state.teamName = '';
        if (!state.memberJobs) state.memberJobs = { MT:'GNB', ST:'PLD', H1:'WHM', H2:'SCH', D1:'SAM', D2:'RPR', D3:'MCH', D4:'RDM' };
        // migrate old blobId to teamId if needed
        if (!state.teamId && state.blobId) {
          state.teamId = state.blobId;
          delete state.blobId;
        }
        // 迁移旧版 state.token：直接删除（现在用内置 token）
        if (state.token) {
          delete state.token;
        }
        if (!state.playerMappingCache) state.playerMappingCache = {};
        for (const day of Object.values(state.days)) {
          for (const key of Object.keys(ROLES)) {
            if (!day.members[key]) day.members[key] = { mistakes: [] };
            if (!day.members[key].mistakes) day.members[key].mistakes = [];
          }
          if (!day.teamIssues) day.teamIssues = [];
          if (!day.fflogs) day.fflogs = null;
        }
        return;
      }
    }
  } catch (e) { /* corrupted, reset */ }
  state = createEmptyState();
  saveLocal();
}

function saveLocal() {
  try {
    state.lastModified = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    showToast('⚠️ 本地存储已满，请导出数据备份', 'error');
  }
}

function getDay(date) {
  if (!state.days[date]) {
    state.days[date] = createEmptyDay();
    saveLocal();
  }
  return state.days[date];
}

function getActiveDay() {

}

// ============================================================
// Data stored as data/{teamId}.json in the repo
// GitHub API 云存储：内置 PAT token，用户零配置

let githubToken = BUILTIN_TOKEN;
let cloudFileSha = ''; // SHA of current file on GitHub, needed for updates

debouncedSaveToCloud = debounce(syncToCloud, 1500);

function getTeamDataPath() {
  return `data/${state.teamId || 'default'}.json`;
}

function githubApiUrl() {
  return `${GITHUB_API}/repos/${GITHUB_REPO}/contents/${getTeamDataPath()}`;
}

function githubHeaders(forWrite) {
  const h = {
    'Accept': 'application/vnd.github.v3+json',
    'Authorization': `token ${githubToken}`
  };
  if (forWrite) {
    h['Content-Type'] = 'application/json';
  }
  return h;
}

async function syncToCloud() {
  if (!state.teamId) return;
  try {
    // 队长：直接上传本地数据（队长是数据源）
    // 队员：先拉取云端作为基础，只叠加备注改动，避免覆盖队长记录
    if (!isCaptain()) {
      let mergeBase = null;
      let cloudFetchFailed = false;
      try {
        const getResp = await fetch(githubApiUrl(), { headers: githubHeaders(false) });
        if (getResp.ok) {
          const getData = await getResp.json();
          cloudFileSha = getData.sha;
          const raw = decodeURIComponent(escape(atob(getData.content)));
          mergeBase = JSON.parse(raw);
        } else if (getResp.status !== 404) {
          cloudFetchFailed = true;
        }
      } catch (_) {
        cloudFetchFailed = true;
      }

      if (cloudFetchFailed) {
        showToast('⚠️ 无法获取云端最新数据，请稍后再试', 'error');
        return;
      }

      if (mergeBase) {
        // 以云端为基础，只叠加队员的备注改动
        for (const [dateKey, localDay] of Object.entries(state.days || {})) {
          if (!mergeBase.days[dateKey]) continue;
          for (const [memberKey, localMember] of Object.entries(localDay.members || {})) {
            const baseMember = mergeBase.days[dateKey].members[memberKey];
            if (!baseMember) continue;
            for (const localM of localMember.mistakes) {
              const baseM = baseMember.mistakes.find(cm => cm.id === localM.id);
              if (baseM && localM.tips && localM.tips !== (baseM.tips || '')) {
                baseM.tips = localM.tips;
                baseM.tipsBy = localM.tipsBy;
              }
            }
          }
        }
        mergeBase.teamId = state.teamId;
        mergeBase.teamName = state.teamName;
        state = mergeBase;
        saveLocal();
      }
      // 404用本地数据上传，continue
    } else {
      // 队长直接上传本地数据，但先获取最新 SHA 避免 409
      if (!cloudFileSha) {
        try {
          const getResp = await fetch(githubApiUrl(), { headers: githubHeaders(false) });
          if (getResp.ok) {
            const getData = await getResp.json();
            cloudFileSha = getData.sha;
          }
        } catch (_) {}
      }
    }

    // 上传前更新时间戳，确保云端数据比本地旧时不被覆盖
    state.lastModified = Date.now();
    saveLocal();
    console.log('[syncToCloud] 上传数据，lastModified:', new Date(state.lastModified).toLocaleString(), '天数:', Object.keys(state.days).length);

    // base64 编码（与下载解码完全对称：encodeURIComponent → escape → btoa）
    const base64 = btoa(unescape(encodeURIComponent(JSON.stringify(state))));

    const body = {
      message: `update ${getTeamDataPath()}`,
      content: base64,
    };
    if (cloudFileSha) body.sha = cloudFileSha;

    const resp = await fetch(githubApiUrl(), {
      method: 'PUT',
      headers: githubHeaders(true),
      body: JSON.stringify(body),
    });
    if (resp.ok) {
      const data = await resp.json();
      cloudFileSha = data.content.sha;
      lastCloudFetch = JSON.stringify(state);
      lastWriteTime = Date.now(); // 记录写入时间，防止轮询覆盖
      cloudConnected = true;
      // 显示"已同步"状态，3 秒后恢复
      showSavedStatus();
    } else if (resp.status === 409) {
      // SHA 冲突，重新拉取最新数据后重试一次
      console.log('[syncToCloud] SHA 冲突，重新拉取后重试');
      cloudFileSha = '';
      try {
        const getResp = await fetch(githubApiUrl(), { headers: githubHeaders(false) });
        if (getResp.ok) {
          const getData = await getResp.json();
          cloudFileSha = getData.sha;
          // 重试上传
          body.sha = cloudFileSha;
          const retryResp = await fetch(githubApiUrl(), {
            method: 'PUT',
            headers: githubHeaders(true),
            body: JSON.stringify(body),
          });
          if (retryResp.ok) {
            const retryData = await retryResp.json();
            cloudFileSha = retryData.content.sha;
            lastCloudFetch = JSON.stringify(state);
            lastWriteTime = Date.now();
            cloudConnected = true;
            showSavedStatus();
          } else {
            throw new Error('重试仍失败: ' + retryResp.status);
          }
        }
      } catch (retryErr) {
        showToast('❌ 保存冲突，请稍后再试', 'error');
      }
    } else {
      const err = await resp.json().catch(() => ({}));
      console.error('syncToCloud error:', resp.status, err);
      cloudConnected = false;
      setConnStatus('offline');
      renderConnectionBar();
      showToast('❌ 同步失败: ' + (err.message || resp.status), 'error');
    }
  } catch (e) {
    console.error('syncToCloud exception:', e);
    cloudConnected = false;
    setConnStatus('offline');
    renderConnectionBar();
    showToast('❌ 网络异常，数据仅保存在本地: ' + e.message, 'error');
  }
}

// 通过 GitHub API 读取文件内容（无论有无 token）
async function fetchFromCloud(silent) {
  if (!state.teamId) return false;
  // 已移除轮询冷却检查

  let content = null;


  // GitHub API 加上时间戳避免浏览器缓存返回旧数据
  try {
    const c = new AbortController();
    const t = setTimeout(() => c.abort(), FETCH_TIMEOUT);
    const headers = githubHeaders(false);
    const url = githubApiUrl() + '?_=' + Date.now();
    const resp = await fetch(url, { headers, signal: c.signal });
    clearTimeout(t);
    if (resp.ok) {
      const data = await resp.json();
      // base64 解码（与上传编码对称：atob → escape → decodeURIComponent）
      const raw = decodeURIComponent(escape(atob(data.content)));
      content = JSON.parse(raw);
      if (data.sha) cloudFileSha = data.sha; // 更新 SHA
      // 读取成功
    } else if (resp.status === 403) {
      // 速率限制，等下次
      console.warn('[fetchFromCloud] GitHub API 速率限制');
    } else if (resp.status !== 404) {
      console.warn('[fetchFromCloud] GitHub API 错误:', resp.status);
    }
  } catch (e) {
    console.warn('[fetchFromCloud] GitHub API 读取失败:', e.message);
  }

  if (!content) return false;

  // 始终用云端数据覆盖本地，但保护用户正在编辑的备注
  const cloudStr = JSON.stringify(content);
  if (cloudStr !== lastCloudFetch) {
    console.log('[fetchFromCloud] 云端数据有变化，覆盖本地');

    const localPresets = state.mistakePresets;
    const localTeamId = state.teamId;
    const localTeamName = state.teamName;
    const localMemberJobs = state.memberJobs;
    state = content;
    if (!state.mistakePresets) state.mistakePresets = localPresets;
    state.teamId = localTeamId;
    state.teamName = localTeamName;
    if (!state.memberJobs) state.memberJobs = localMemberJobs || { MT:'GNB', ST:'PLD', H1:'WHM', H2:'SCH', D1:'SAM', D2:'RPR', D3:'MCH', D4:'RDM' };

    saveLocal();
    lastCloudFetch = cloudStr;
    if (!silent) renderAll();
    return true;
  }
  return false;
}

function disconnectCloud() {
  cloudConnected = false;
  state.teamId = '';

// GraphQL query templates
const QL_FIGHTS = `
query($code: String!) {
  reportData {
    report(code: $code) {
      startTime
      fights { id name kill startTime endTime bossPercentage fightPercentage lastPhase lastPhaseIsIntermission difficulty encounterID friendlyPlayers }
      masterData { actors { id name server subType type } }
    }
  }
}`;

const QL_DEATHS = `
query($code: String!, $fightIDs: [Int!], $startTime: Float, $endTime: Float) {
  reportData {
    report(code: $code) {
      events(dataType: Deaths, fightIDs: $fightIDs, startTime: $startTime, endTime: $endTime, limit: 10000) { data nextPageTimestamp }
    }
  }
}`;

const QL_CASTS = `
query($code: String!, $fightIDs: [Int!], $startTime: Float, $endTime: Float) {
  reportData {
    report(code: $code) {
      events(dataType: Casts, fightIDs: $fightIDs, startTime: $startTime, endTime: $endTime, limit: 10000) { data nextPageTimestamp }
    }
  }
}`;

function parseFFLogsUrl(url) {
  const match = url.match(/(?:cn|www|na|eu|jp)\.fflogs\.com\/reports\/([A-Za-z0-9]+)(?:[?#].*fight=(\d+))?/);
  if (!match) return null;
  return { code: match[1], fightId: match[2] ? parseInt(match[2]) : null };
}

async function fflogsGraphQL(query, variables) {
  console.log('[FFLogs] Requesting:', FFLOGS_PROXY + '/graphql', 'variables:', variables);
  let resp;
  try {
    resp = await fetch(FFLOGS_PROXY + '/graphql', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, variables }),
    });
  } catch (fetchErr) {
    console.error('[FFLogs] Fetch failed:', fetchErr);
    throw new Error('网络请求失败: ' + fetchErr.message);
  }
  console.log('[FFLogs] Response status:', resp.status);
  if (!resp.ok) {
    const text = await resp.text();
    console.error('[FFLogs] Error response:', text);
    throw new Error(`FFLogs proxy error: ${resp.status}`);
  }
  const data = await resp.json();
  if (data.errors) {
    console.error('[FFLogs] GraphQL errors:', data.errors);
    throw new Error('FFLogs GraphQL error: ' + data.errors.map(e => e.message).join('; '));
  }
  return data.data;
}

async function fetchFights(code) {
  const data = await fflogsGraphQL(QL_FIGHTS, { code });
  const report = data.reportData.report;
  return { fights: report.fights, actors: report.masterData.actors, reportStartTime: report.startTime };
}

async function fetchAllDeaths(code, fightIDs) {
  const allDeaths = [];
  let nextStart = null;
  const vars = { code, fightIDs };
  if (nextStart) vars.startTime = nextStart;
  while (true) {
    if (nextStart) vars.startTime = nextStart;
    const data = await fflogsGraphQL(QL_DEATHS, vars);
    const events = data.reportData.report.events;
    if (events.data) allDeaths.push(...(Array.isArray(events.data) ? events.data : JSON.parse(events.data)));
    if (!events.nextPageTimestamp) break;
    nextStart = events.nextPageTimestamp;

}

function analyzeFights(fights, selectedEncounterID) {
  const filtered = fights.filter(f => f.difficulty >= 100 && f.encounterID === selectedEncounterID);
  if (filtered.length === 0) return null;

  let totalFights = filtered.length;
  let totalTime = 0;
  let bestPhase = -1;
  let bestBossPct = 100; // bossPercentage: lower = more progress
  let hasKill = false;
  let bossName = filtered[0].name;
  let bestFight = filtered[0];

  for (const f of filtered) {
    totalTime += (f.endTime - f.startTime) || 0;
    if (f.kill) { hasKill = true; }
    else {
      // Better progress: higher lastPhase, or same phase with lower bossPercentage
      if (f.lastPhase > bestPhase || (f.lastPhase === bestPhase && (f.bossPercentage || 100) < bestBossPct)) {
        bestPhase = f.lastPhase;
        bestBossPct = f.bossPercentage || 100;
        bestFight = f;
      }
    }
  }

  let furthestPhase;
  if (hasKill) furthestPhase = 'Clear';
  else {
    const phaseNum = bestPhase; // lastPhase is 1-indexed (1=P1, 2=P2, 3=P3)
    if (bestFight.lastPhaseIsIntermission) furthestPhase = `P${phaseNum} 过渡`;
    else furthestPhase = `P${phaseNum}`;
    furthestPhase += ` ${bestBossPct.toFixed(1)}%`;
  }

  return { bossName, totalFights, totalTime, furthestPhase, bestPhase, bestBossPct, hasKill, fights: filtered };
}

function autoMapPlayers(actors, memberNames, playerMappingCache, memberJobs, fightPlayerIds) {
  // Filter: only real players with a valid job, and only those in the selected fights
  const INVALID_SUBTYPES = ['LimitBreak', 'Unknown', 'Pet', 'NPC', 'Boss'];
  let players = actors.filter(a =>
    a.type === 'Player' && !INVALID_SUBTYPES.includes(a.subType)
  );
  // If we know which player IDs participated in the selected fights, filter further
  if (fightPlayerIds && fightPlayerIds.length > 0) {
    const idSet = new Set(fightPlayerIds);
    players = players.filter(p => idSet.has(p.id));
  }

  const mapping = {};
  const unmapped = [];
  const usedPositions = new Set();

  // Try auto-match from cache and memberNames
  for (const p of players) {
    let matched = false;
    // 1. Check playerMappingCache
    if (playerMappingCache[p.name] && !usedPositions.has(playerMappingCache[p.name])) {
      mapping[p.name] = playerMappingCache[p.name];
      usedPositions.add(playerMappingCache[p.name]);
      matched = true;
    }
    // 2. Check memberNames exact match
    if (!matched) {
      for (const [pos, name] of Object.entries(memberNames)) {
        if (name === p.name && !usedPositions.has(pos)) {
          mapping[p.name] = pos;
          usedPositions.add(pos);
          matched = true;
          break;
        }
      }
    }
    if (!matched) unmapped.push(p);
  }

  return { mapping, unmapped, usedPositions, players };
}

function suggestPositionForPlayer(player, usedPositions) {
  const role = FFLOGS_ROLE_MAP[player.subType] || 'dps';
  const rolePositions = Object.entries(ROLES).filter(([k, v]) => v.role === role).map(([k]) => k);
  for (const pos of rolePositions) {
    if (!usedPositions.has(pos)) return pos;
  }
  return '';
}

function countDeathsByPosition(deathEvents, actorMapping) {
  // actorMapping: { actorId: positionKey }
  const counts = {};
  for (const key of Object.keys(ROLES)) counts[key] = 0;
  for (const event of deathEvents) {
    const pos = actorMapping[event.targetID];
    if (pos && counts[pos] !== undefined) counts[pos]++;
  }
  return counts;
}

function buildAbilityTimeline(castEvents, actorMapping, fights) {
  // Build fight lookup for startTime offset
  const fightMap = {};
  for (const f of fights) fightMap[f.id] = f;
  const timeline = [];
  for (const event of castEvents) {
    const pos = actorMapping[event.sourceID];
    const fight = fightMap[event.fight];
    if (pos && fight) {
      // timestamp relative to fight start (events use report-absolute timestamps)
      const relTs = event.timestamp - fight.startTime;
      timeline.push({
        player: pos,
        ability: event.ability?.name || 'Unknown',
        abilityId: event.ability?.gameID || 0,
        timestamp: relTs,
        fightId: event.fight,
      });
    }
  }
  return timeline;
}

function formatDuration(ms) {
  if (ms < 1000) return `${ms}ms`;
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60);
  const rs = s % 60;
  if (m < 60) return `${m}m${rs}s`;
  const h = Math.floor(m / 60);
  const rm = m % 60;
  return `${h}h${rm}m`;
}

// ===== FFLogs Import Flow =====

let fflogsImportState = {
  code: null, fightId: null, fights: null, actors: null,
  selectedEncounterID: null, analysis: null, deathEvents: null,
  actorMapping: {}, playerMapping: {},
};

async function startFFLogsImport() {
  const urlInput = document.getElementById('fflogsUrlInput');
  const statusEl = document.getElementById('fflogsImportStatus');
  const url = urlInput.value.trim();
  if (!url) { showToast('⚠️ 请输入 FFLogs 链接', 'error'); return; }

  const parsed = parseFFLogsUrl(url);
  if (!parsed) { showToast('❌ 无法解析链接，请检查格式', 'error'); return; }

  fflogsImportState = { code: parsed.code, fightId: parsed.fightId, fights: null, actors: null, selectedEncounterID: null, analysis: null, deathEvents: null, actorMapping: {}, playerMapping: {} };

  // Step 1: Fetch fights
  showFFLogsStatus(statusEl, 'loading', '⏳ 正在获取战斗数据...');
  try {
    const data = await fetchFights(parsed.code);
    fflogsImportState.fights = data.fights;
    fflogsImportState.actors = data.actors;
    fflogsImportState.reportStartTime = data.reportStartTime;

    // If single fight URL, auto-select that encounter
    if (parsed.fightId) {
      const targetFight = data.fights.find(f => f.id === parsed.fightId);
      if (targetFight) {
        fflogsImportState.selectedEncounterID = targetFight.encounterID;
        proceedAfterBossSelect();
      } else {
        showFFLogsStatus(statusEl, 'error', `❌ 找不到第 ${parsed.fightId} 场战斗`);
      }
    } else {
      // Full report: show boss selection panel
      showBossSelectPanel(data.fights, statusEl);
    }
  } catch (err) {
    showFFLogsStatus(statusEl, 'error', '❌ 获取数据失败: ' + err.message);
  }
}

function showBossSelectPanel(allFights, statusEl) {
  // Group fights by encounterID
  const encounters = {};
  for (const f of allFights) {
    if (f.difficulty < 100) continue; // skip trash
    if (!encounters[f.encounterID]) encounters[f.encounterID] = { name: f.name, id: f.encounterID, count: 0, kills: 0 };
    encounters[f.encounterID].count++;
    if (f.kill) encounters[f.encounterID].kills++;
  }

  const panel = document.getElementById('fflogsBossSelectPanel');
  const encounterList = Object.values(encounters);
  if (encounterList.length === 0) {
    showFFLogsStatus(statusEl, 'error', '❌ 未找到高难度战斗记录');
    panel.style.display = 'none';
    return;
  }
  if (encounterList.length === 1) {
    // Auto-select single encounter
    fflogsImportState.selectedEncounterID = encounterList[0].id;
    panel.style.display = 'none';
    proceedAfterBossSelect();
    return;
  }

  let html = '<h3 style="font-size:0.9rem;">选择要分析的 Boss</h3><div class="fflogs-boss-list">';
  for (const enc of encounterList) {
    html += `<div class="fflogs-boss-item" data-encounter-id="${enc.id}">
      <span class="fflogs-boss-name">${enc.name}</span>
      <span class="fflogs-boss-count">${enc.count} 场 (Clear ${enc.kills})</span>
    </div>`;
  }
  html += '</div>';
  panel.innerHTML = html;
  panel.style.display = '';
  statusEl.style.display = 'none';

  // Click handler for boss selection
  panel.querySelectorAll('.fflogs-boss-item').forEach(item => {
    item.addEventListener('click', () => {
      panel.querySelectorAll('.fflogs-boss-item').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      fflogsImportState.selectedEncounterID = parseInt(item.dataset.encounterId);
      setTimeout(() => {
        panel.style.display = 'none';
        proceedAfterBossSelect();
      }, 200);
    });
  });
}

async function proceedAfterBossSelect() {
  const statusEl = document.getElementById('fflogsImportStatus');
  const analysis = analyzeFights(fflogsImportState.fights, fflogsImportState.selectedEncounterID);
  if (!analysis) {
    showFFLogsStatus(statusEl, 'error', '❌ 未找到符合条件的战斗');
    return;
  }
  fflogsImportState.analysis = analysis;

  // Step 2: Auto-map players
  // Collect all friendly player IDs from the selected boss fights
  const fightPlayerIds = [];
  for (const f of analysis.fights) {
    if (f.friendlyPlayers) fightPlayerIds.push(...f.friendlyPlayers);
  }
  // Deduplicate
  const uniqueFightPlayerIds = [...new Set(fightPlayerIds)];
  // Remove LimitBreak IDs (id 12 or similar - check subType)
  const realPlayerIds = uniqueFightPlayerIds.filter(id => {
    const actor = fflogsImportState.actors.find(a => a.id === id);
    return actor && actor.type === 'Player' && !['LimitBreak','Unknown','Pet','NPC','Boss'].includes(actor.subType);
  });

  const { mapping, unmapped, usedPositions, players } = autoMapPlayers(
    fflogsImportState.actors, state.memberNames, state.playerMappingCache, state.memberJobs, realPlayerIds
  );
  fflogsImportState.playerMapping = mapping;

  if (unmapped.length > 0) {
    // Show mapping panel
    showMappingPanel(unmapped, usedPositions, statusEl);
  } else {
    // All mapped, proceed
    finishMappingAndFetch(statusEl);
  }
}

function showMappingPanel(unmappedPlayers, usedPositions, statusEl) {
  const panel = document.getElementById('fflogsMappingPanel');
  let html = `<h3 style="font-size:0.9rem;">🔗 角色映射</h3>
    <p style="font-size:0.8rem; color:var(--text-muted);">将 FFLogs 角色名映射到对应位置：</p>
    <div class="fflogs-mapping-rows">`;

  for (const p of unmappedPlayers) {
    const suggested = suggestPositionForPlayer(p, usedPositions);
    const jobKey = FFLOGS_JOB_MAP[p.subType] || p.subType;
    html += `<div class="fflogs-mapping-row" data-actor-id="${p.id}" data-actor-name="${escapeHtml(p.name)}">
      <span class="player-name">${escapeHtml(p.name)}</span>
      <span class="player-job">${jobKey}</span>
      <select class="mapping-select" data-actor-id="${p.id}">
        <option value="">-- 不映射 --</option>`;
    for (const [pos, roleDef] of Object.entries(ROLES)) {
      const selected = pos === suggested ? ' selected' : '';
      html += `<option value="${pos}"${selected}>${roleDef.label}</option>`;
    }
    html += `</select></div>`;
  }

  html += '</div><div class="fflogs-mapping-actions">';
  html += '<button class="btn btn-primary" id="fflogsMappingConfirm">✓ 确认映射</button>';
  html += '<button class="btn" id="fflogsMappingCancel">取消</button>';
  html += '</div>';

  panel.innerHTML = html;
  panel.style.display = '';
  statusEl.style.display = 'none';

  document.getElementById('fflogsMappingConfirm').onclick = () => {
    // Collect mappings from dropdowns
    panel.querySelectorAll('.mapping-select').forEach(sel => {
      const actorId = parseInt(sel.dataset.actorId);
      const position = sel.value;
      if (position) {
        const actor = unmappedPlayers.find(p => p.id === actorId);
        if (actor) fflogsImportState.playerMapping[actor.name] = position;
      }
    });
    panel.style.display = 'none';
    finishMappingAndFetch(statusEl);
  };

  document.getElementById('fflogsMappingCancel').onclick = () => {
    panel.style.display = 'none';
    showFFLogsStatus(statusEl, 'error', '❌ 已取消导入');
  };
}

async function finishMappingAndFetch(statusEl) {
  // Build actorId → position mapping
  const actorIdMap = {};
  const players = fflogsImportState.actors.filter(a => a.type === 'Player');
  for (const p of players) {
    const pos = fflogsImportState.playerMapping[p.name];
    if (pos) actorIdMap[p.id] = pos;
  }
  fflogsImportState.actorMapping = actorIdMap;

  // Save mapping to cache
  for (const [name, pos] of Object.entries(fflogsImportState.playerMapping)) {
    state.playerMappingCache[name] = pos;
  }

  // Step 3: Fetch deaths
  showFFLogsStatus(statusEl, 'loading', '⏳ 正在获取死亡数据...');
  try {
    const fightIDs = fflogsImportState.analysis.fights.map(f => f.id);
    const deathEvents = await fetchAllDeaths(fflogsImportState.code, fightIDs);
    fflogsImportState.deathEvents = deathEvents;

    // Step 4: Fetch all cast events, then filter for mitigation abilities locally
    showFFLogsStatus(statusEl, 'loading', '⏳ 正在获取减伤技能数据...');
    const allCasts = await fetchAllCasts(fflogsImportState.code, fightIDs);
    // Filter: only keep mitigation ability casts from mapped players
    const mitiIds = new Set(Object.keys(MITIGATION_ABILITIES).map(Number));
    const mappedActorIds = new Set(Object.keys(fflogsImportState.actorMapping).map(Number));
    const mitigationCasts = allCasts.filter(c =>
      mitiIds.has(c.abilityGameID) && mappedActorIds.has(c.sourceID)
    );
    // Enrich with ability name
    for (const c of mitigationCasts) {
      c.ability = { name: MITIGATION_ABILITIES[c.abilityGameID] || 'Unknown', gameID: c.abilityGameID };
    }
    fflogsImportState.castEvents = mitigationCasts;

    // Step 5: Build final data and save
    const deathsByPosition = countDeathsByPosition(deathEvents, actorIdMap);
    const timeline = buildAbilityTimeline(fflogsImportState.castEvents || [], actorIdMap, fflogsImportState.analysis.fights);

    const day = getActiveDay();
    day.fflogs = {
      reportCode: fflogsImportState.code,
      fightId: fflogsImportState.fightId,
      url: document.getElementById('fflogsUrlInput').value.trim(),
      importedAt: Date.now(),
      reportStartTime: fflogsImportState.reportStartTime,
      bossName: fflogsImportState.analysis.bossName,
      furthestPhase: fflogsImportState.analysis.furthestPhase,
      totalFights: fflogsImportState.analysis.totalFights,
      totalTime: fflogsImportState.analysis.totalTime,
      hasKill: fflogsImportState.analysis.hasKill,
      deaths: deathsByPosition,
      playerMapping: fflogsImportState.playerMapping,
      abilityTimeline: timeline,
      fights: fflogsImportState.analysis.fights.map(f => ({
        id: f.id, kill: f.kill, duration: f.endTime - f.startTime,
        startTime: f.startTime, bossPercentage: f.bossPercentage,
        fightPercentage: f.fightPercentage, lastPhase: f.lastPhase,
        lastPhaseIsIntermission: f.lastPhaseIsIntermission,
      })),
    };

    saveLocal();
    showFFLogsStatus(statusEl, 'success', '✅ 导入完成');
    renderFFLogsSection();

  } catch (err) {
    showFFLogsStatus(statusEl, 'error', '❌ 获取数据失败: ' + err.message);
  }
}

  el.textContent = msg;
}

function renderAbilityTimeline(fl) {
  const container = document.getElementById('fflogsTimeline');
  if (!fl.abilityTimeline || fl.abilityTimeline.length === 0) {
    container.innerHTML = '<p style="font-size:0.85rem; color:var(--text-muted);">暂无追踪技能数据（需配置追踪技能列表）</p>';
    return;
  }

  // Group timeline by player+ability
  const groups = {};
  for (const item of fl.abilityTimeline) {
    const key = `${item.player}|${item.ability}`;
    if (!groups[key]) groups[key] = { player: item.player, ability: item.ability, casts: [] };
    groups[key].casts.push(item.timestamp);
  }

  const rows = Object.values(groups);
  // Calculate total time range from fights
  const maxTime = fl.totalTime || fl.fights.reduce((sum, f) => sum + f.duration, 0);
  if (maxTime <= 0) { container.innerHTML = '<p style="color:var(--text-muted)">时间范围无效</p>'; return; }

  // Build fight separators
  const fightStarts = [];
  let cumTime = 0;
  for (const f of fl.fights) {
    fightStarts.push({ time: cumTime, id: f.id, kill: f.kill });
    cumTime += f.duration;
  }

  const roleColors = { tank: 'var(--role-tank)', healer: 'var(--role-healer)', dps: 'var(--role-dps)' };

  let html = '';
  for (const row of rows) {
    const roleColor = roleColors[ROLES[row.player]?.role] || 'var(--accent-gold)';
    html += `<div class="fflogs-timeline-row">
      <div class="fflogs-timeline-row-label">${ROLES[row.player]?.label || row.player} ${row.ability}</div>
      <div class="fflogs-timeline-track">`;
    // Fight separators
    for (const fs of fightStarts) {
      const pct = (fs.time / maxTime) * 100;
      html += `<div class="fflogs-timeline-separator" style="left:${pct}%"><span class="fflogs-timeline-sep-label">#${fs.id}</span></div>`;
    }
    // Cast markers
    for (const ts of row.casts) {
      const pct = (ts / maxTime) * 100;
      if (pct < 0 || pct > 100) continue;
      html += `<div class="fflogs-timeline-marker" style="left:${pct}%; background:${roleColor}" title="${row.ability} - ${ROLES[row.player]?.label} @ ${formatDuration(ts)}"></div>`;
    }
    html += '</div></div>';
  }

  // Time axis
  html += '<div class="fflogs-timeline-time-axis">';
  const numLabels = 6;
  for (let i = 0; i <= numLabels; i++) {
    const pct = (i / numLabels) * 100;
    const time = (i / numLabels) * maxTime;
    html += `<span class="fflogs-timeline-time-label" style="left:${pct}%">${formatDuration(time)}</span>`;
  }
  html += '</div>';

  container.innerHTML = html;

  // Add hover tooltip handler
  container.querySelectorAll('.fflogs-timeline-marker').forEach(marker => {
    marker.addEventListener('mouseenter', (e) => {
      const existing = document.querySelector('.fflogs-tooltip');
      if (existing) existing.remove();
      const tip = document.createElement('div');
      tip.className = 'fflogs-tooltip';
      tip.textContent = marker.title;
      tip.style.left = e.clientX + 10 + 'px';
      tip.style.top = e.clientY - 20 + 'px';
      document.body.appendChild(tip);
    });
    marker.addEventListener('mouseleave', () => {
      const tip = document.querySelector('.fflogs-tooltip');
      if (tip) tip.remove();
    });
  });
}

function renderFightList(fl) {
  const content = document.getElementById('fflogsFightListContent');
  let html = '<div class="fflogs-fight-row header"><span>#</span><span>时间</span><span>结果</span><span>时长</span><span>进度</span><span>阶段</span></div>';
  for (const f of fl.fights) {
    const result = f.kill ? '<span class="fflogs-fight-kill">Clear</span>' : '<span class="fflogs-fight-wipe">Wipe</span>';
    const pct = f.kill ? '0%' : `${(f.bossPercentage || 0).toFixed(1)}%`;
    const phase = f.lastPhaseIsIntermission ? `P${f.lastPhase}过渡` : `P${f.lastPhase}`;
    // Earth time: reportStartTime + fight.startTime gives epoch ms
    const epochMs = (fl.reportStartTime || 0) + (f.startTime || 0);
    const timeStr = epochMs > 0 ? new Date(epochMs).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '-';
    html += `<div class="fflogs-fight-row">
      <span>${f.id}</span><span>${timeStr}</span>${result}<span>${formatDuration(f.duration)}</span><span>${pct}</span><span>${phase}</span>
    </div>`;
  }
  content.innerHTML = html;
}

// Global click delegation
document.getElementById('app').addEventListener('click', function(e) {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  switch (action) {

    // --- Quick Bar ---
    case 'preset-click': {
      const preset = target.dataset.preset;
      const isTeam = selectedMember === '__team__';
      if (!selectedMember) {
        showToast('请先在快速栏选择队员', 'info');
        return;
      }
      if (isTeam) {
        const day = getActiveDay();
        day.teamIssues.push({ id: generateId(), description: preset, severity: 'medium' });
      } else {
        const day = getActiveDay();
        day.members[selectedMember].mistakes.push({
          id: generateId(), description: preset, count: 1, tips: '', tipsBy: ''
        });
      }
      saveState();
      if (isTeam) renderTeamIssues(); else renderMemberCards();
      showToast(`已添加: ${isTeam ? '⚠️ 团队 · ' : selectedMember + ' · '}${preset}`, 'success');
      break;
    }

    case 'toggle-tips': {
      const entry = target.closest('.mistake-entry');
      if (!entry) return;
      entry.classList.toggle('expanded');
      break;
    }

    // --- Mistake CRUD ---
    case 'show-add-form': {
      const key = target.dataset.member;
      const card = target.closest('.member-card');
      const form = card.querySelector('.add-mistake-form');
      form.style.display = 'block';
      target.style.display = 'none';
      form.querySelector('.add-desc-input').focus();
      break;
    }

    case 'save-new-mistake': {
      const key = target.dataset.member;
      const card = target.closest('.member-card');
      const form = card.querySelector('.add-mistake-form');
      const desc = form.querySelector('.add-desc-input').value.trim();
      const count = parseInt(form.querySelector('.add-count').value) || 1;
      if (!desc) { showToast('请输入犯错描述', 'error'); return; }
      const day = getActiveDay();
      day.members[key].mistakes.push({
        id: generateId(), description: desc, count, tips: '', tipsBy: ''
      });
      saveState();
      renderMemberCards();
      showToast(`已添加 ${key} · ${desc}`, 'success');
      break;
    }

    case 'cancel-new-mistake': {
      const key = target.dataset.member;
      const card = target.closest('.member-card');
      const form = card.querySelector('.add-mistake-form');
      const btn = card.querySelector('[data-action="show-add-form"]');
      form.style.display = 'none';
      btn.style.display = '';
      form.querySelector('.add-desc-input').value = '';
      break;
    }

    case 'delete-mistake': {
      if (!confirm('确定删除这条犯错记录吗？')) return;
      const key = target.dataset.member;
      const mid = target.dataset.mistakeId;
      const day = getActiveDay();
      day.members[key].mistakes = day.members[key].mistakes.filter(m => m.id !== mid);
      saveState();
      renderMemberCards();
      showToast('已删除', 'info');
      break;
    }

    // --- Team Issues ---
    case 'delete-issue': {
      const iid = target.dataset.issueId;
      const day = getActiveDay();
      day.teamIssues = day.teamIssues.filter(i => i.id !== iid);
      saveState();
      renderTeamIssues();
      break;
    }

    // --- Preset Editor ---
    case 'remove-preset': {
      const preset = target.dataset.preset;
      state.mistakePresets = state.mistakePresets.filter(p => p !== preset);
      saveState();
      renderPresets();
      renderPresetEditor();
      break;
    }

    // --- Connection ---
    case 'copy-blob-id':
      copyBlobId();
      break;
    case 'disconnect':
      disconnectCloud();
      break;
  }
});

function renderCalendar() {
  const title = document.getElementById('calTitle');
  const grid = document.getElementById('calDays');
  title.textContent = `${calViewYear}年${calViewMonth}月`;

  const today = todayISO();
  const firstDay = new Date(calViewYear, calViewMonth - 1, 1);
  // Monday=0, Sunday=6
  let startWeekday = firstDay.getDay() - 1;
  if (startWeekday < 0) startWeekday = 6;

  const daysInMonth = new Date(calViewYear, calViewMonth, 0).getDate();
  const daysInPrevMonth = new Date(calViewYear, calViewMonth - 1, 0).getDate();

  // Days with records
  const recordedDates = new Set();
  for (const dateStr of Object.keys(state.days)) {
    const day = state.days[dateStr];
    if (day && (day.furthestPhase || day.generalNotes ||
        Object.values(day.members).some(m => m.mistakes && m.mistakes.length > 0) ||
        (day.teamIssues && day.teamIssues.length > 0))) {
      recordedDates.add(dateStr);
    }
  }

  let html = '';

  // Previous month padding
  for (let i = startWeekday - 1; i >= 0; i--) {
    const d = daysInPrevMonth - i;
    const pm = calViewMonth - 1 || 12;
    const py = calViewMonth === 1 ? calViewYear - 1 : calViewYear;
    const iso = `${py}-${String(pm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += `<span class="cal-day other-month" data-date="${iso}">${d}</span>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${calViewYear}-${String(calViewMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'cal-day';
    if (iso === today) cls += ' today';
    if (iso === activeDate) cls += ' active';
    if (recordedDates.has(iso)) cls += ' has-record';
    html += `<span class="${cls}" data-date="${iso}">${d}</span>`;
  }

  // Next month padding
  const totalCells = startWeekday + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let d = 1; d <= remaining; d++) {
    const nm = calViewMonth + 1 > 12 ? 1 : calViewMonth + 1;
    const ny = calViewMonth + 1 > 12 ? calViewYear + 1 : calViewYear;
    const iso = `${ny}-${String(nm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += `<span class="cal-day other-month" data-date="${iso}">${d}</span>`;
  }

  grid.innerHTML = html;
}
