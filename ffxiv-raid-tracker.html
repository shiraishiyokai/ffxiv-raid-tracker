function buildSummaryText(date) {
  const day = state.days[date];
  if (!day) return '该日期暂无数据。';
  const lines = [];
  lines.push(`📋 副本开荒总结 — ${date} (${formatDate(date)})`);
  lines.push('━'.repeat(46));
  lines.push('');
  lines.push(`📊 最远进度: ${day.furthestPhase || '(未记录)'}`);
  lines.push('');

  for (const group of ROLE_GROUPS) {
    const hasErrors = group.members.some(k => {
      const m = day.members[k];
      return m && m.mistakes && m.mistakes.length > 0;
    });
    if (!hasErrors) continue;

    const roleEmoji = { tank: '🛡️', healer: '💚', dps: '⚔️' };
    lines.push(`━━━ ${roleEmoji[group.role] || ''} ${group.heading} ━━━`);
    for (const key of group.members) {
      const member = day.members[key];
      if (!member) continue;
      const role = ROLES[key];
      const name = state.memberNames[key] || key;
      if (!member.mistakes || member.mistakes.length === 0) {
        lines.push(`${roleEmoji[group.role]} ${key} — ${name}: 干净 ✨`);
      } else {
        const total = member.mistakes.reduce((s, m) => s + (m.count || 1), 0);
        lines.push(`${roleEmoji[group.role]} ${key} — ${name}: ${total} 次犯错`);
        for (const m of member.mistakes) {
          lines.push(`  • ${m.description} (×${m.count || 1})`);
          if (m.tips && m.tips.trim()) {
            lines.push(`    ↳ 复盘: ${m.tips.trim()}`);
          }
        }
      }
    }
    lines.push('');
  }

  if (day.teamIssues && day.teamIssues.length > 0) {
    lines.push('⚠️ 团队问题:');
    for (const issue of day.teamIssues) {
      const sev = SEVERITY[issue.severity] || SEVERITY.medium;
      lines.push(`  ${sev.icon} ${sev.label.toUpperCase()} — ${issue.description}`);
    }
    lines.push('');
  }

  lines.push(`📝 备注: ${day.generalNotes || '(无)'}`);
  lines.push('');
  lines.push('Generated by FFXIV Raid Mistake Tracker');

  return lines.join('\n');
}

// ============================================================
// SECTION 8: TOAST NOTIFICATIONS
// ============================================================
function showToast(message, type) {
  type = type || 'info';
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    if (toast.parentNode) toast.remove();
  }, 3000);
}

// ============================================================
// SECTION 9: INITIALIZATION
// ============================================================
function isCaptain() {
  return window.location.hash === '#captain';
}

function applyRole() {
  const captain = isCaptain();
  const indicator = document.getElementById('roleIndicator');
  if (captain) {
    document.body.classList.remove('member-mode');
    indicator.textContent = '👑 队长';
    indicator.className = 'captain';
    indicator.id = 'roleIndicator';
  } else {
    document.body.classList.add('member-mode');
    indicator.textContent = '🧑 队员 (仅可添加备注)';
    indicator.className = 'member';
    indicator.id = 'roleIndicator';
    const fp = document.getElementById('furthestPhase');
    const gn = document.getElementById('generalNotes');
    if (fp) fp.readOnly = true;
    if (gn) gn.readOnly = true;
  }
}

async function init() {
  loadState();

  // Read URL params: ?team=xxx & ?repo=user/repo
  const params = new URLSearchParams(window.location.search);
  const urlTeam = params.get('team') || '';
  // token 已内置，不再从 URL 读取
  const urlRepo = params.get('repo') || '';

  // 仓库地址：URL 参数优先，支持不同队伍使用不同仓库
  if (urlRepo) GITHUB_REPO = urlRepo;

  // URL params override localStorage; localStorage is fallback
  if (urlTeam) state.teamId = urlTeam;
  // token 已内置，无需从 localStorage 恢复

  applyRole();
  activeDate = todayISO();

  // Cloud connection — fetch first, then render with latest data
  if (state.teamId) {
    // 同步 teamId 到 URL
    const url = new URL(window.location);
    if (url.searchParams.get('team') !== state.teamId) {
      url.searchParams.set('team', state.teamId);
      if (isCaptain() && !url.hash) url.hash = 'captain';
      window.history.replaceState({}, '', url);
    }
    setConnStatus('syncing', '加载中...');
    renderConnectionBar();
    // 先拉取云端最新数据，再渲染页面
    fetchFromCloud(false).then(changed => {
      cloudConnected = true;
      setConnStatus('online', '');
      renderConnectionBar();
      renderAll();
    }).catch(e => {
      cloudConnected = true;
      setConnStatus('online', '');
      renderConnectionBar();
      renderAll();
    });
  } else if (isCaptain()) {
    // Captain with no team — auto create
      state.teamId = 'team-' + Date.now().toString(36);
      if (!state.teamName) state.teamName = '我的队伍';
      saveLocal();
      setConnStatus('syncing', '创建记录本...');
      renderConnectionBar();
      syncToCloud().then(() => {
        cloudConnected = true;
        setConnStatus('online', '');
        renderConnectionBar();
        startSyncTimer();
        const url = new URL(window.location);
        url.searchParams.set('team', state.teamId);
        window.history.replaceState({}, '', url);
        showToast('✅ 在线记录本已创建！点击「📋 复制分享链接」发给队员', 'success');
      }).catch(e => {
        setConnStatus('local', '');
        renderConnectionBar();
        showToast('❌ 创建失败: ' + e.message, 'error');
      });
  } else {
    // Member with no team
    setConnStatus('local', '');
    renderConnectionBar();
    showToast('⚠️ 未检测到队伍，请使用队长分享的链接打开', 'info');
  }
}

// Listen for hash changes
window.addEventListener('hashchange', function() {
  applyRole();
  renderAll();
});

document.addEventListener('DOMContentLoaded', init);

// ============================================================
// Debug helper (accessible from console)
// ============================================================
window.__ffxivTracker = {
  state: () => state,
  reset: () => {
    if (confirm('确定要清除所有本地数据吗？此操作不可撤销。')) {
      state = createEmptyState();
      saveLocal();
      cloudConnected = false;
      stopSyncTimer();
      activeDate = todayISO();
      setConnStatus('local', '');
      renderAll();
      showToast('⚠️ 数据已重置', 'info');
    }
  },
  forceSync: () => syncToCloud(),
  forceFetch: () => fetchFromCloud(false),
};
</script>
